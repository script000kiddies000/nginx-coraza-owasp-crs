<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Selamat datang</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(ellipse 110% 60% at 50% -10%, rgba(16, 185, 129, 0.18), transparent 50%),
        linear-gradient(155deg, #0f172a 0%, #064e3b 55%, #022c22 100%);
      color: #ecfeff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(52, 211, 153, 0.38);
      border-radius: 1rem;
      padding: 2.25rem 2.5rem;
      max-width: 28rem;
      text-align: center;
      box-shadow: 0 28px 56px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .hero-icon {
      width: 3.25rem;
      height: 3.25rem;
      margin: 0 auto 1.15rem;
      border-radius: 1rem;
      background: linear-gradient(160deg, rgba(52, 211, 153, 0.22), rgba(6, 78, 59, 0.35));
      border: 1px solid rgba(52, 211, 153, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6ee7b7;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
    }
    .hero-icon svg {
      width: 1.65rem;
      height: 1.65rem;
      stroke-width: 2;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-bottom: 1rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #34d399;
    }
    .badge svg {
      width: 0.9rem;
      height: 0.9rem;
      stroke-width: 2.25;
    }
    h1 {
      font-size: 1.85rem;
      margin: 0 0 0.85rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #f8fafc;
    }
    p {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.65;
      opacity: 0.9;
      color: #a5f3fc;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="hero-icon" aria-hidden="true"><i data-lucide="layout-template"></i></div>
    <p class="badge"><i data-lucide="shield-check"></i> Flux WAF</p>
    <h1>Selamat datang</h1>
    <p>Situs statis Anda sudah aktif. Sunting halaman ini dari dashboard Flux WAF.</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
    });
  </script>
</body>
</html>
