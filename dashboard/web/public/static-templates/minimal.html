<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Halaman statis</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(ellipse 120% 70% at 50% -15%, rgba(16, 185, 129, 0.14), transparent 55%),
        linear-gradient(165deg, #0b1220 0%, #111827 48%, #0f172a 100%);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .wrap { width: 100%; max-width: 36rem; }
    .card {
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(52, 211, 153, 0.22);
      border-radius: 1rem;
      padding: 2.25rem 2rem;
      box-shadow: 0 24px 56px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .hero {
      width: 3rem;
      height: 3rem;
      margin-bottom: 1.1rem;
      border-radius: 0.85rem;
      background: linear-gradient(145deg, rgba(52, 211, 153, 0.18), rgba(52, 211, 153, 0.05));
      border: 1px solid rgba(52, 211, 153, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #34d399;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
    }
    .hero svg {
      width: 1.5rem;
      height: 1.5rem;
      stroke-width: 2;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #34d399;
      margin-bottom: 1rem;
    }
    .badge svg {
      width: 0.85rem;
      height: 0.85rem;
      stroke-width: 2.25;
      flex-shrink: 0;
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #f8fafc;
    }
    p {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.7;
      color: #94a3b8;
    }
    .line {
      height: 1px;
      margin-top: 1.35rem;
      background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.28), transparent);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero" aria-hidden="true"><i data-lucide="file-code"></i></div>
      <div class="badge"><i data-lucide="layers"></i> Static</div>
      <h1>Halo</h1>
      <p>Halaman statis Anda sudah aktif melalui Flux WAF. Ganti konten ini dari dashboard.</p>
      <div class="line" aria-hidden="true"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
    });
  </script>
</body>
</html>
