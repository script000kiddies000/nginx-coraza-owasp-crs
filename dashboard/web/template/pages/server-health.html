{{define "content"}}
<div x-data="serverHealth()" x-init="start()">
  <div class="mb-5 flex flex-wrap items-center justify-between gap-3">
    <div>
      <h1 class="text-xl font-semibold text-white">Server Monitor</h1>
      <p class="text-xs text-gray-500">Real-time system resources, network and disk I/O</p>
    </div>
    <div class="flex items-center gap-2">
      <button type="button" @click="load()"
              class="text-xs font-semibold text-cyan-300 border border-cyan-500/30 hover:bg-cyan-500/10 px-3 py-2 rounded-lg transition-colors">
        Refresh
      </button>
      <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer select-none">
        <input type="checkbox" x-model="auto" class="rounded border-gray-700 bg-gray-900 text-cyan-500 focus:ring-cyan-500/40">
        Auto
      </label>
    </div>
  </div>

  <template x-if="error">
    <div class="rounded-xl border border-rose-500/30 bg-rose-500/10 text-rose-200 text-sm px-4 py-3 mb-4" x-text="error"></div>
  </template>

  <div class="grid gap-3 lg:grid-cols-12">
    <div class="rounded-xl border border-gray-800 bg-[#1c2940] p-4 lg:col-span-4">
      <div class="text-xs font-semibold text-white mb-3">Server Info</div>
      <dl class="space-y-2 text-xs">
        <div class="flex items-center justify-between gap-2"><dt class="text-gray-400">Hostname</dt><dd class="text-gray-100" x-text="data?.hostname || '—'"></dd></div>
        <div class="flex items-center justify-between gap-2"><dt class="text-gray-400">OS</dt><dd class="text-gray-100" x-text="data?.os_name || '—'"></dd></div>
        <div class="flex items-center justify-between gap-2"><dt class="text-gray-400">Kernel</dt><dd class="text-gray-100" x-text="data?.kernel_version || '—'"></dd></div>
        <div class="flex items-center justify-between gap-2"><dt class="text-gray-400">Uptime</dt><dd class="text-gray-100" x-text="fmtUptime(data?.uptime_seconds)"></dd></div>
        <div class="flex items-center justify-between gap-2"><dt class="text-gray-400">CPU Cores</dt><dd class="text-gray-100" x-text="data?.cpu_cores || '—'"></dd></div>
        <div class="flex items-center justify-between gap-2"><dt class="text-gray-400">IP Address</dt><dd class="text-gray-100" x-text="data?.primary_ip || '—'"></dd></div>
      </dl>
    </div>

    <div class="rounded-xl border border-gray-800 bg-[#1c2940] p-4 lg:col-span-4">
      <div class="text-xs font-semibold text-white mb-3">Memory</div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <div x-ref="ramChart" class="h-24"></div>
          <div class="text-center text-[10px] text-gray-400 -mt-2">RAM</div>
        </div>
        <div>
          <div x-ref="swapChart" class="h-24"></div>
          <div class="text-center text-[10px] text-gray-400 -mt-2">Swap</div>
        </div>
      </div>
      <div class="mt-3 text-[11px] text-gray-400 flex items-center justify-around">
        <div x-text="bytesLineGiB(data?.memory_used_gb, data?.memory_total_gb)"></div>
        <div x-text="bytesLineGiB(data?.swap_used_gb, data?.swap_total_gb)"></div>
      </div>
    </div>

    <div class="rounded-xl border border-gray-800 bg-[#1c2940] p-4 lg:col-span-4">
      <div class="flex items-center justify-between mb-3">
        <div class="text-xs font-semibold text-white">Storage</div>
        <div class="text-xs font-semibold text-emerald-400" x-text="pct(memPct(data?.disk_used_gb, data?.disk_total_gb))"></div>
      </div>
      <div class="h-2 rounded-full bg-gray-800 overflow-hidden">
        <div class="h-full rounded-full bg-emerald-400 transition-all duration-300"
             :style="'width:' + memPct(data?.disk_used_gb, data?.disk_total_gb) + '%'"></div>
      </div>
      <div class="mt-2 text-[11px] text-gray-400" x-text="bytesLineGiB(data?.disk_used_gb, data?.disk_total_gb)"></div>
      <div class="mt-3">
        <span class="inline-flex items-center gap-1.5 text-[11px] font-semibold px-2 py-1 rounded-md border"
              :class="data?.nginx_daemon_up ? 'text-emerald-300 border-emerald-500/30 bg-emerald-500/10' : 'text-rose-300 border-rose-500/30 bg-rose-500/10'"
              x-text="data?.nginx_daemon_up ? 'Nginx Up' : 'Nginx Down'"></span>
      </div>
    </div>

    <div class="rounded-xl border border-gray-800 bg-[#1c2940] p-4 lg:col-span-6">
      <div class="text-xs text-gray-400 mb-1">Total Received</div>
      <div class="text-2xl font-semibold text-white" x-text="fmtBytes(data?.network_rx_bytes)"></div>
    </div>
    <div class="rounded-xl border border-gray-800 bg-[#1c2940] p-4 lg:col-span-6">
      <div class="text-xs text-gray-400 mb-1">Total Sent</div>
      <div class="text-2xl font-semibold text-white" x-text="fmtBytes(data?.network_tx_bytes)"></div>
    </div>

    <div class="rounded-xl border border-gray-800 bg-[#1c2940] p-4 lg:col-span-4">
      <div class="flex items-center justify-between mb-1">
        <div class="text-sm font-semibold text-white">CPU Usage</div>
        <div class="text-sm font-semibold text-violet-300" x-text="pct(data?.cpu_usage_percent)"></div>
      </div>
      <div class="text-[11px] text-gray-500 mb-2">last 60 samples</div>
      <div x-ref="cpuChart" class="h-24 rounded-md bg-gray-900/50 border border-gray-800 overflow-hidden"></div>
    </div>

    <div class="rounded-xl border border-gray-800 bg-[#1c2940] p-4 lg:col-span-4">
      <div class="flex items-center justify-between mb-1">
        <div class="text-sm font-semibold text-white">Network I/O</div>
        <div class="text-[11px] text-cyan-300" x-text="'RX ' + fmtRate(rxRate) + ' / TX ' + fmtRate(txRate)"></div>
      </div>
      <div class="text-[11px] text-gray-500 mb-2">bytes/sec (recent)</div>
      <div x-ref="netChart" class="h-24 rounded-md bg-gray-900/50 border border-gray-800 overflow-hidden"></div>
    </div>

    <div class="rounded-xl border border-gray-800 bg-[#1c2940] p-4 lg:col-span-4">
      <div class="flex items-center justify-between mb-1">
        <div class="text-sm font-semibold text-white">Disk I/O</div>
        <div class="text-[11px] text-rose-300" x-text="'R ' + fmtRate(diskReadRate) + ' / W ' + fmtRate(diskWriteRate)"></div>
      </div>
      <div class="text-[11px] text-gray-500 mb-2">bytes/sec (recent)</div>
      <div x-ref="diskChart" class="h-24 rounded-md bg-gray-900/50 border border-gray-800 overflow-hidden"></div>
    </div>
  </div>
</div>

<script src="/public/js/apexcharts.min.js"></script>
<script src="/public/js/pages/server-health.js?v={{.AssetVersion}}"></script>
{{end}}
