{{define "content"}}
<div class="w-full min-h-[calc(100vh-6.5rem)] flex flex-col gap-4" x-data="atkReportApp()" x-init="init()">
  <div class="flex items-end justify-between gap-3 flex-wrap">
    <div>
      <h2 class="text-xl font-semibold text-white">Attack Report</h2>
      <p class="text-xs text-gray-500 mt-0.5">Per-domain attack analytics from Coraza security events</p>
    </div>
    <div class="flex items-center gap-2">
      <select x-model="period" @change="load()"
              class="text-xs bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-gray-200">
        <option value="24h">24h</option>
        <option value="7d">7 days</option>
        <option value="30d">30 days</option>
        <option value="all">All time</option>
      </select>
      <a :href="'/api/reports/attack/download?period=' + encodeURIComponent(period)"
         class="text-xs font-semibold text-cyan-300 bg-cyan-500/15 border border-cyan-500/30 hover:bg-cyan-500/20 px-3 py-1.5 rounded-md transition-colors">
        Export JSON
      </a>
      <button type="button" @click="load()"
              class="text-xs font-semibold text-emerald-300 bg-emerald-500/15 border border-emerald-500/30 hover:bg-emerald-500/20 px-3 py-1.5 rounded-md transition-colors">
        Refresh
      </button>
    </div>
  </div>

  <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
    <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
      <p class="text-2xl font-bold text-amber-400 tabular-nums" x-text="summary.total">0</p>
      <p class="text-xs text-gray-500">Total Events</p>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
      <p class="text-2xl font-bold text-rose-400 tabular-nums" x-text="summary.blocked">0</p>
      <p class="text-xs text-gray-500">Blocked</p>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
      <p class="text-2xl font-bold text-orange-400 tabular-nums" x-text="summary.detected">0</p>
      <p class="text-xs text-gray-500">Detected</p>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
      <p class="text-2xl font-bold text-sky-400 tabular-nums" x-text="summary.domains">0</p>
      <p class="text-xs text-gray-500">Domains Hit</p>
    </div>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-2 gap-3">
    <div class="rounded-xl border border-gray-800 bg-gray-900/50 p-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-xs font-semibold uppercase tracking-wider text-white">Top Rule IDs</h3>
        <span class="text-[11px] text-gray-500" x-text="topRules.length + ' items'"></span>
      </div>
      <div class="space-y-2">
        <template x-if="topRules.length === 0">
          <p class="text-gray-600 text-sm py-4 text-center">No data.</p>
        </template>
        <template x-for="row in topRules" :key="row.id">
          <div class="flex items-center gap-2">
            <div class="w-40 text-[11px] text-amber-300 font-mono truncate" :title="row.id" x-text="row.id"></div>
            <div class="flex-1 h-2 rounded bg-gray-800 overflow-hidden">
              <div class="h-full rounded bg-gradient-to-r from-amber-500 to-orange-400"
                   :style="'width:' + row.pct + '%'"></div>
            </div>
            <div class="w-10 text-right text-[11px] text-gray-300 font-mono" x-text="row.n"></div>
          </div>
        </template>
      </div>
    </div>

    <div class="rounded-xl border border-gray-800 bg-gray-900/50 p-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-xs font-semibold uppercase tracking-wider text-white">Top Attacking IPs</h3>
        <span class="text-[11px] text-gray-500" x-text="topIPs.length + ' items'"></span>
      </div>
      <div class="space-y-2">
        <template x-if="topIPs.length === 0">
          <p class="text-gray-600 text-sm py-4 text-center">No data.</p>
        </template>
        <template x-for="row in topIPs" :key="row.ip">
          <div class="flex items-center gap-2">
            <div class="w-40 text-[11px] text-cyan-300 font-mono truncate" :title="row.ip" x-text="row.ip"></div>
            <div class="flex-1 h-2 rounded bg-gray-800 overflow-hidden">
              <div class="h-full rounded bg-gradient-to-r from-cyan-500 to-sky-400"
                   :style="'width:' + row.pct + '%'"></div>
            </div>
            <div class="w-10 text-right text-[11px] text-gray-300 font-mono" x-text="row.n"></div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <div class="rounded-xl border border-gray-800 bg-gray-900/50 p-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-xs font-semibold uppercase tracking-wider text-white">Recent Security Events</h3>
      <span class="text-[11px] text-gray-500" x-text="events.length + ' rows'"></span>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-[11px]">
        <thead>
          <tr class="text-left text-gray-500 border-b border-gray-800">
            <th class="py-2 pr-2">Time</th>
            <th class="py-2 pr-2">IP</th>
            <th class="py-2 pr-2">Rule ID</th>
            <th class="py-2 pr-2">Action</th>
            <th class="py-2 pr-2">URI</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="(e, i) in events.slice(0, 100)" :key="i">
            <tr class="border-b border-gray-900/60">
              <td class="py-2 pr-2 text-gray-400 font-mono" x-text="e.time || '—'"></td>
              <td class="py-2 pr-2 text-cyan-300 font-mono" x-text="e.client_ip || '—'"></td>
              <td class="py-2 pr-2 text-amber-300 font-mono" x-text="e.rule_id || '—'"></td>
              <td class="py-2 pr-2">
                <span class="px-2 py-0.5 rounded-full border text-[10px] font-semibold"
                      :class="(e.action || '').toLowerCase().includes('block')
                        ? 'text-rose-300 border-rose-500/35 bg-rose-500/12'
                        : 'text-emerald-300 border-emerald-500/35 bg-emerald-500/12'"
                      x-text="e.action || '—'"></span>
              </td>
              <td class="py-2 pr-2 text-gray-300 font-mono truncate max-w-[320px]" :title="e.uri || ''" x-text="e.uri || '—'"></td>
            </tr>
          </template>
        </tbody>
      </table>
      <p x-show="!events.length && !loading" class="text-gray-600 text-sm py-6 text-center">No events found.</p>
      <p x-show="loading" class="text-gray-500 text-sm py-6 text-center">Loading...</p>
    </div>
  </div>
</div>

<script src="/public/js/pages/attack-report.js?v={{.AssetVersion}}"></script>
{{end}}
