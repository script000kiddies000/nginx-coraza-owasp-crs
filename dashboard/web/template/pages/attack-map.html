{{define "content"}}
<link rel="stylesheet" href="/public/css/leaflet.css">
<link rel="stylesheet" href="/public/css/fonts.css">
<style>
  .flux-ct-map .leaflet-container { background: #0a0d12; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
  .flux-ct-map .leaflet-control-zoom a {
    background: rgba(15, 23, 42, 0.92) !important;
    color: #94a3b8 !important;
    border: 1px solid rgba(51, 65, 85, 0.8) !important;
  }
  .flux-ct-map .leaflet-control-zoom a:hover { color: #22d3ee !important; }
  .flux-ct-map .leaflet-control-attribution {
    background: rgba(10, 13, 18, 0.85) !important;
    color: #475569 !important;
    font-size: 10px;
    max-width: 40%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .flux-ct-map .leaflet-control-attribution a { color: #64748b; }
  @keyframes flux-target-pulse {
    0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(34, 211, 153, 0.55); }
    50% { transform: scale(1.08); opacity: 0.95; box-shadow: 0 0 24px 10px rgba(34, 211, 153, 0.2); }
  }
  .flux-target-dot {
    width: 14px; height: 14px; border-radius: 9999px;
    background: #22c55e;
    border: 2px solid rgba(167, 243, 208, 0.9);
    animation: flux-target-pulse 2s ease-in-out infinite;
  }
  .flux-src-dot {
    width: 8px; height: 8px; border-radius: 9999px;
    background: #f97316;
    border: 1px solid rgba(254, 215, 170, 0.9);
    box-shadow: 0 0 12px rgba(249, 115, 22, 0.45);
  }
  .flux-digital { font-family: 'Share Tech Mono', ui-monospace, monospace; }
  .flux-feed-scroll::-webkit-scrollbar { width: 6px; }
  .flux-feed-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  /* Flex child so map/globe area can shrink/grow correctly */
  #flux-map-stage { min-height: 0; }
</style>

<div class="flux-ct-map -m-6 flex flex-col min-h-[calc(100vh-3.5rem)] bg-[#070a0f] text-slate-200 border-t border-slate-800/80"
     x-data="attackMapApp()" x-init="init()">

  <!-- HUD header (WafX-style) -->
  <header class="flex flex-wrap items-center gap-4 px-4 py-3 border-b border-slate-800/90 bg-gradient-to-r from-[#0a0d12] via-[#0d1117] to-[#0a0d12] shrink-0">
    <div class="flex items-center gap-3 min-w-0">
      <span class="text-cyan-400 font-bold tracking-tight text-sm shrink-0">Flux<span class="text-white">WAF</span></span>
      <span class="hidden sm:inline text-slate-600">|</span>
      <div class="min-w-0">
        <p class="text-[10px] sm:text-xs font-semibold tracking-[0.2em] text-cyan-500/90 uppercase truncate">Cyberthreat Live Map</p>
        <p class="text-[10px] text-slate-500 hidden md:block">Flux WAF · security intelligence</p>
      </div>
    </div>

    <div class="flex flex-wrap items-center gap-4 md:gap-8 ml-auto">
      <div class="text-right">
        <p class="text-[9px] uppercase tracking-widest text-slate-500">Total attacks (24h demo)</p>
        <p class="flux-digital text-2xl md:text-3xl text-emerald-400 leading-none tabular-nums drop-shadow-[0_0_12px_rgba(52,211,153,0.35)]"
           x-text="totalToday.toLocaleString()">0</p>
      </div>
      <div class="text-right border-l border-slate-800 pl-4 md:pl-8">
        <p class="flux-digital text-xl text-slate-300 tabular-nums" x-text="clockTime">00:00:00</p>
        <p class="text-[10px] text-slate-500" x-text="clockDate">—</p>
      </div>
      <div class="flex items-center gap-2 text-[10px] sm:text-xs font-medium text-emerald-400/90 whitespace-nowrap">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-60"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
        </span>
        System online · detecting threats
      </div>

      <div class="flex items-center gap-2 text-[10px] sm:text-xs ml-0 sm:ml-2">
        <button type="button"
                @click="setViewMode('plane')"
                :class="viewMode === 'plane' ? 'text-emerald-400 bg-emerald-500/10 border border-emerald-500/20' : 'text-slate-300 hover:text-white bg-slate-900/20 border border-slate-800'"
                class="px-2 py-1 rounded-lg font-semibold transition-colors">
          Plane
        </button>
        <button type="button"
                @click="setViewMode('globe')"
                :class="viewMode === 'globe' ? 'text-emerald-400 bg-emerald-500/10 border border-emerald-500/20' : 'text-slate-300 hover:text-white bg-slate-900/20 border border-slate-800'"
                class="px-2 py-1 rounded-lg font-semibold transition-colors">
          Globe
        </button>
      </div>
    </div>
  </header>

  <div class="flex flex-1 flex-col lg:flex-row min-h-0 min-h-[560px] lg:min-h-[calc(100vh-7.5rem)]">

    <!-- Left: real-time detection -->
    <aside class="w-full lg:w-[270px] shrink-0 border-b lg:border-b-0 lg:border-r border-slate-800 bg-[#080b10]/95 flex flex-col max-h-[280px] lg:max-h-none">
      <div class="px-3 py-2 border-b border-slate-800/80 flex items-center gap-2">
        <span class="w-1.5 h-1.5 bg-cyan-500 rounded-sm"></span>
        <h2 class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Real-time detection</h2>
      </div>
      <div class="flex-1 overflow-y-auto flux-feed-scroll px-2 py-2 space-y-1">
        <template x-for="(c, idx) in categories" :key="c.code">
          <div class="rounded-md px-2 py-1.5 hover:bg-slate-800/40 transition-colors">
            <div class="flex justify-between gap-2 text-[11px] leading-tight">
              <span class="text-cyan-600/90 font-mono w-8 shrink-0" x-text="c.code"></span>
              <span class="text-slate-400 truncate" x-text="c.label"></span>
              <span class="flux-digital text-amber-400/90 shrink-0 tabular-nums" x-text="c.count"></span>
            </div>
            <div class="mt-1 h-1 rounded-full bg-slate-800 overflow-hidden">
              <div class="h-full rounded-full transition-all duration-500"
                   :class="barColorClass(idx)"
                   :style="'width:' + barPct(c.count) + '%'"></div>
            </div>
          </div>
        </template>
      </div>
      <p class="px-3 py-2 text-[10px] text-slate-600 border-t border-slate-800/60" x-show="demo">
        <span class="text-amber-500/80">Demo</span> · <span x-text="label"></span>
      </p>
    </aside>

    <!-- Map + feed overlay -->
    <div id="flux-map-stage" class="relative flex-1 min-h-[420px] lg:min-h-0 bg-[#0a0d12]">
      <div id="flux-leaflet-map" class="absolute inset-0 z-0"></div>
      <!-- On small screens, stop globe above the feed panel so it stays visually centered -->
      <div id="flux-globe-container"
           class="absolute left-0 right-0 top-0 bottom-0 z-0 hidden"
           :class="{ 'max-lg:bottom-[220px]': viewMode === 'globe', 'lg:right-[380px]': viewMode === 'globe' }"></div>
      <canvas id="flux-globe-canvas"
              class="absolute left-0 right-0 top-0 bottom-0 z-0 hidden"
              :class="{ 'max-lg:bottom-[220px]': viewMode === 'globe', 'lg:right-[380px]': viewMode === 'globe' }"></canvas>

      <!-- Zoom hint -->
      <div class="absolute bottom-3 left-3 z-[400] pointer-events-none text-[10px] text-slate-600 hidden lg:block">
        Carto Dark · OpenStreetMap
      </div>

      <!-- Global attack feed -->
      <div class="absolute bottom-0 right-0 top-auto lg:top-3 lg:bottom-3 left-0 lg:left-auto z-[500] w-full lg:w-[min(100%,380px)] max-h-[220px] lg:max-h-none flex flex-col m-0 lg:mr-3 lg:ml-0 pointer-events-auto">
        <div class="mx-2 mb-2 lg:mx-0 flex-1 flex flex-col rounded-lg border border-cyan-950/50 bg-[#070a0f]/95 backdrop-blur-md shadow-[0_0_40px_rgba(8,145,178,0.08)] overflow-hidden">
          <div class="px-3 py-2 border-b border-slate-800/80 flex items-center justify-between gap-2">
            <div class="flex items-center gap-2">
              <span class="w-1.5 h-1.5 bg-orange-500 rounded-sm"></span>
              <h2 class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Global attack feed</h2>
            </div>
            <span class="text-[10px] text-cyan-600/80 font-mono uppercase">All</span>
          </div>
          <div class="flux-feed-scroll overflow-y-auto flex-1 min-h-0">
            <table class="w-full text-left text-[11px]">
              <thead class="text-slate-500 uppercase tracking-wider sticky top-0 bg-[#070a0f] z-10">
                <tr class="border-b border-slate-800/80">
                  <th class="px-2 py-1.5 font-semibold">Type</th>
                  <th class="px-2 py-1.5 font-semibold">Time</th>
                  <th class="px-2 py-1.5 font-semibold">IP</th>
                  <th class="px-2 py-1.5 font-semibold">Country</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-800/60">
                <template x-for="row in feed" :key="row._key">
                  <tr class="hover:bg-slate-800/30 font-mono">
                    <td class="px-2 py-1.5">
                      <span class="inline-block px-1.5 py-0.5 rounded text-[10px] font-bold bg-orange-500/15 text-orange-300 border border-orange-500/25"
                            x-text="row.type_code || '—'"></span>
                    </td>
                    <td class="px-2 py-1.5 text-slate-500 tabular-nums" x-text="row.time || fmtTime(row.ts)"></td>
                    <td class="px-2 py-1.5 text-cyan-500/80" x-text="row.source_ip || '—'"></td>
                    <td class="px-2 py-1.5 text-slate-400 truncate max-w-[100px]" x-text="row.country || '—'"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/public/js/leaflet.min.js"></script>
<script src="/public/js/d3-geo.min.js"></script>
<script src="/public/js/topojson.min.js"></script>
<script src="/public/js/three.min.js"></script>
<script src="/public/js/globe.gl.min.js"></script>
<script src="/public/js/pages/attack-map.js?v={{.AssetVersion}}"></script>
{{end}}
