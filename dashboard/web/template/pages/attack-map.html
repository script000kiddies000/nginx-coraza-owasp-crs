{{define "content"}}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  .flux-ct-map .leaflet-container { background: #0a0d12; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
  .flux-ct-map .leaflet-control-zoom a {
    background: rgba(15, 23, 42, 0.92) !important;
    color: #94a3b8 !important;
    border: 1px solid rgba(51, 65, 85, 0.8) !important;
  }
  .flux-ct-map .leaflet-control-zoom a:hover { color: #22d3ee !important; }
  .flux-ct-map .leaflet-control-attribution {
    background: rgba(10, 13, 18, 0.85) !important;
    color: #475569 !important;
    font-size: 10px;
    max-width: 40%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .flux-ct-map .leaflet-control-attribution a { color: #64748b; }
  @keyframes flux-target-pulse {
    0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(34, 211, 153, 0.55); }
    50% { transform: scale(1.08); opacity: 0.95; box-shadow: 0 0 24px 10px rgba(34, 211, 153, 0.2); }
  }
  .flux-target-dot {
    width: 14px; height: 14px; border-radius: 9999px;
    background: #22c55e;
    border: 2px solid rgba(167, 243, 208, 0.9);
    animation: flux-target-pulse 2s ease-in-out infinite;
  }
  .flux-src-dot {
    width: 8px; height: 8px; border-radius: 9999px;
    background: #f97316;
    border: 1px solid rgba(254, 215, 170, 0.9);
    box-shadow: 0 0 12px rgba(249, 115, 22, 0.45);
  }
  .flux-digital { font-family: 'Share Tech Mono', ui-monospace, monospace; }
  .flux-feed-scroll::-webkit-scrollbar { width: 6px; }
  .flux-feed-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  /* Flex child so map/globe area can shrink/grow correctly */
  #flux-map-stage { min-height: 0; }
</style>

<div class="flux-ct-map -m-6 flex flex-col min-h-[calc(100vh-3.5rem)] bg-[#070a0f] text-slate-200 border-t border-slate-800/80"
     x-data="attackMapApp()" x-init="init()">

  <!-- HUD header (WafX-style) -->
  <header class="flex flex-wrap items-center gap-4 px-4 py-3 border-b border-slate-800/90 bg-gradient-to-r from-[#0a0d12] via-[#0d1117] to-[#0a0d12] shrink-0">
    <div class="flex items-center gap-3 min-w-0">
      <span class="text-cyan-400 font-bold tracking-tight text-sm shrink-0">Flux<span class="text-white">WAF</span></span>
      <span class="hidden sm:inline text-slate-600">|</span>
      <div class="min-w-0">
        <p class="text-[10px] sm:text-xs font-semibold tracking-[0.2em] text-cyan-500/90 uppercase truncate">Cyberthreat Live Map</p>
        <p class="text-[10px] text-slate-500 hidden md:block">Flux WAF · security intelligence</p>
      </div>
    </div>

    <div class="flex flex-wrap items-center gap-4 md:gap-8 ml-auto">
      <div class="text-right">
        <p class="text-[9px] uppercase tracking-widest text-slate-500">Total attacks (24h demo)</p>
        <p class="flux-digital text-2xl md:text-3xl text-emerald-400 leading-none tabular-nums drop-shadow-[0_0_12px_rgba(52,211,153,0.35)]"
           x-text="totalToday.toLocaleString()">0</p>
      </div>
      <div class="text-right border-l border-slate-800 pl-4 md:pl-8">
        <p class="flux-digital text-xl text-slate-300 tabular-nums" x-text="clockTime">00:00:00</p>
        <p class="text-[10px] text-slate-500" x-text="clockDate">—</p>
      </div>
      <div class="flex items-center gap-2 text-[10px] sm:text-xs font-medium text-emerald-400/90 whitespace-nowrap">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-60"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
        </span>
        System online · detecting threats
      </div>

      <div class="flex items-center gap-2 text-[10px] sm:text-xs ml-0 sm:ml-2">
        <button type="button"
                @click="setViewMode('plane')"
                :class="viewMode === 'plane' ? 'text-emerald-400 bg-emerald-500/10 border border-emerald-500/20' : 'text-slate-300 hover:text-white bg-slate-900/20 border border-slate-800'"
                class="px-2 py-1 rounded-lg font-semibold transition-colors">
          Plane
        </button>
        <button type="button"
                @click="setViewMode('globe')"
                :class="viewMode === 'globe' ? 'text-emerald-400 bg-emerald-500/10 border border-emerald-500/20' : 'text-slate-300 hover:text-white bg-slate-900/20 border border-slate-800'"
                class="px-2 py-1 rounded-lg font-semibold transition-colors">
          Globe
        </button>
      </div>
    </div>
  </header>

  <div class="flex flex-1 flex-col lg:flex-row min-h-0 min-h-[560px] lg:min-h-[calc(100vh-7.5rem)]">

    <!-- Left: real-time detection -->
    <aside class="w-full lg:w-[270px] shrink-0 border-b lg:border-b-0 lg:border-r border-slate-800 bg-[#080b10]/95 flex flex-col max-h-[280px] lg:max-h-none">
      <div class="px-3 py-2 border-b border-slate-800/80 flex items-center gap-2">
        <span class="w-1.5 h-1.5 bg-cyan-500 rounded-sm"></span>
        <h2 class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Real-time detection</h2>
      </div>
      <div class="flex-1 overflow-y-auto flux-feed-scroll px-2 py-2 space-y-1">
        <template x-for="(c, idx) in categories" :key="c.code">
          <div class="rounded-md px-2 py-1.5 hover:bg-slate-800/40 transition-colors">
            <div class="flex justify-between gap-2 text-[11px] leading-tight">
              <span class="text-cyan-600/90 font-mono w-8 shrink-0" x-text="c.code"></span>
              <span class="text-slate-400 truncate" x-text="c.label"></span>
              <span class="flux-digital text-amber-400/90 shrink-0 tabular-nums" x-text="c.count"></span>
            </div>
            <div class="mt-1 h-1 rounded-full bg-slate-800 overflow-hidden">
              <div class="h-full rounded-full transition-all duration-500"
                   :class="barColorClass(idx)"
                   :style="'width:' + barPct(c.count) + '%'"></div>
            </div>
          </div>
        </template>
      </div>
      <p class="px-3 py-2 text-[10px] text-slate-600 border-t border-slate-800/60" x-show="demo">
        <span class="text-amber-500/80">Demo</span> · <span x-text="label"></span>
      </p>
    </aside>

    <!-- Map + feed overlay -->
    <div id="flux-map-stage" class="relative flex-1 min-h-[420px] lg:min-h-0 bg-[#0a0d12]">
      <div id="flux-leaflet-map" class="absolute inset-0 z-0"></div>
      <!-- On small screens, stop globe above the feed panel so it stays visually centered -->
      <div id="flux-globe-container"
           class="absolute inset-x-0 top-0 bottom-0 z-0 hidden"
           :class="{ 'max-lg:bottom-[220px]': viewMode === 'globe' }"></div>
      <canvas id="flux-globe-canvas"
              class="absolute inset-x-0 top-0 bottom-0 z-0 hidden"
              :class="{ 'max-lg:bottom-[220px]': viewMode === 'globe' }"></canvas>

      <!-- Zoom hint -->
      <div class="absolute bottom-3 left-3 z-[400] pointer-events-none text-[10px] text-slate-600 hidden lg:block">
        Carto Dark · OpenStreetMap
      </div>

      <!-- Global attack feed -->
      <div class="absolute bottom-0 right-0 top-auto lg:top-3 lg:bottom-3 left-0 lg:left-auto z-[500] w-full lg:w-[min(100%,380px)] max-h-[220px] lg:max-h-none flex flex-col m-0 lg:mr-3 lg:ml-0 pointer-events-auto">
        <div class="mx-2 mb-2 lg:mx-0 flex-1 flex flex-col rounded-lg border border-cyan-950/50 bg-[#070a0f]/95 backdrop-blur-md shadow-[0_0_40px_rgba(8,145,178,0.08)] overflow-hidden">
          <div class="px-3 py-2 border-b border-slate-800/80 flex items-center justify-between gap-2">
            <div class="flex items-center gap-2">
              <span class="w-1.5 h-1.5 bg-orange-500 rounded-sm"></span>
              <h2 class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Global attack feed</h2>
            </div>
            <span class="text-[10px] text-cyan-600/80 font-mono uppercase">All</span>
          </div>
          <div class="flux-feed-scroll overflow-y-auto flex-1 min-h-0">
            <table class="w-full text-left text-[11px]">
              <thead class="text-slate-500 uppercase tracking-wider sticky top-0 bg-[#070a0f] z-10">
                <tr class="border-b border-slate-800/80">
                  <th class="px-2 py-1.5 font-semibold">Type</th>
                  <th class="px-2 py-1.5 font-semibold">Time</th>
                  <th class="px-2 py-1.5 font-semibold">IP</th>
                  <th class="px-2 py-1.5 font-semibold">Country</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-800/60">
                <template x-for="row in feed" :key="row._key">
                  <tr class="hover:bg-slate-800/30 font-mono">
                    <td class="px-2 py-1.5">
                      <span class="inline-block px-1.5 py-0.5 rounded text-[10px] font-bold bg-orange-500/15 text-orange-300 border border-orange-500/25"
                            x-text="row.type_code || '—'"></span>
                    </td>
                    <td class="px-2 py-1.5 text-slate-500 tabular-nums" x-text="row.time || fmtTime(row.ts)"></td>
                    <td class="px-2 py-1.5 text-cyan-500/80" x-text="row.source_ip || '—'"></td>
                    <td class="px-2 py-1.5 text-slate-400 truncate max-w-[100px]" x-text="row.country || '—'"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/d3-geo@3"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2.33.1/dist/globe.gl.min.js"></script>
<script>
function attackMapApp() {
  return {
    demo: false,
    label: '',
    totalToday: 0,
    categories: [],
    points: [],
    allLogs: [],
    feed: [],
    originLat: -2.5,
    originLon: 118,
    loopTimer: null,
    clockTimer: null,
    catMax: 1,
    clockTime: '00:00:00',
    clockDate: '—',
    map: null,
    layerGroup: null,
    rocketTimer: null,
    rocketAnims: [],
    globeTimer: null,
    globeArcs: [],
    viewMode: 'plane',
    globeCtx: null,
    globeW: 0,
    globeH: 0,
    globeR: 0,
    globeLandFeatures: null,
    globeRotateLon: 0,
    globeRotateLat: 0,
    globeDragging: false,
    globeDragStartX: 0,
    globeDragStartY: 0,
    globeDragStartLon: 0,
    globeDragStartLat: 0,
    globe3d: null,

    barPct(count) {
      const m = this.catMax || 1;
      return Math.min(100, Math.round((count / m) * 100));
    },
    barColorClass(i) {
      const palette = ['bg-cyan-500/70', 'bg-sky-500/70', 'bg-orange-500/70', 'bg-amber-500/70', 'bg-emerald-500/70'];
      return palette[i % palette.length];
    },

    fmtTime(ts) {
      try {
        const d = new Date(ts);
        return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      } catch (_) { return ts; }
    },

    colorForCountry(code) {
      // Deterministic per-country color (same country always same hue).
      const palette = [
        '#fb923c', '#38bdf8', '#a78bfa', '#34d399', '#f472b6',
        '#f59e0b', '#22d3ee', '#60a5fa', '#f97316', '#10b981',
        '#e879f9', '#f43f5e', '#84cc16', '#facc15', '#06b6d4',
      ];
      const s = String(code || 'ZZ');
      let h = 0;
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h) + s.charCodeAt(i);
      const idx = Math.abs(h) % palette.length;
      return palette[idx];
    },

    /** ISO 3166-1 alpha-2 (e.g. US, ID) → English country name; falls back to code. */
    displayCountryName(code) {
      const c = String(code || '').trim().toUpperCase();
      if (!c || c === 'ZZ' || c === '—') return 'Unknown';
      try {
        if (typeof Intl !== 'undefined' && Intl.DisplayNames) {
          const dn = new Intl.DisplayNames(['en'], { type: 'region' });
          const name = dn.of(c);
          if (name && name !== c) return name;
        }
      } catch (_) { /* invalid region code */ }
      return c;
    },

    approxDistanceKm(a, b) {
      const toRad = (d) => d * Math.PI / 180;
      const R = 6371;
      const dLat = toRad(b[0] - a[0]);
      const dLon = toRad(b[1] - a[1]);
      const lat1 = toRad(a[0]);
      const lat2 = toRad(b[0]);
      const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(x));
    },

    hexToRgb(hex) {
      const raw = String(hex || '').replace('#', '');
      const val = raw.length === 3
        ? raw.split('').map((c) => c + c).join('')
        : raw.padEnd(6, '0').slice(0, 6);
      const n = parseInt(val, 16);
      return {
        r: (n >> 16) & 255,
        g: (n >> 8) & 255,
        b: n & 255,
      };
    },

    curvedLatLngs(a, b, bulge) {
      const midLat = (a[0] + b[0]) / 2 + Math.abs(b[0] - a[0]) * (bulge || 0.35);
      // Plane mode: keep non-shortest interpolation as requested by user.
      const lon1 = a[1];
      const lon2 = b[1];
      const midLon = (lon1 + lon2) / 2;
      const steps = 140;
      const pts = [];
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const lat = (1 - t) * (1 - t) * a[0] + 2 * (1 - t) * t * midLat + t * t * b[0];
        const lon = (1 - t) * (1 - t) * lon1 + 2 * (1 - t) * t * midLon + t * t * lon2;
        pts.push([lat, lon]);
      }
      return pts;
    },

    /** Stop globe.gl rAF / WebGL churn when not visible (plane mode). */
    stopGlobe3dRender() {
      if (!this.globe3d) return;
      try {
        if (typeof this.globe3d.pauseAnimation === 'function') this.globe3d.pauseAnimation();
      } catch (_) {}
    },

    /** Resume globe.gl after returning to globe mode. */
    resumeGlobe3dRender() {
      if (!this.globe3d) return;
      try {
        if (typeof this.globe3d.resumeAnimation === 'function') this.globe3d.resumeAnimation();
      } catch (_) {}
    },

    startClock() {
      if (this.clockTimer) clearInterval(this.clockTimer);
      const tick = () => {
        const d = new Date();
        this.clockTime = d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        this.clockDate = d.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
      };
      tick();
      this.clockTimer = setInterval(tick, 1000);
    },

    drawMap() {
      if (typeof L === 'undefined') return;
      const el = document.getElementById('flux-leaflet-map');
      if (!el) return;

      this.stopGlobe3dRender();

      const canvas = document.getElementById('flux-globe-canvas');
      if (canvas) canvas.classList.add('hidden');
      const globeContainer = document.getElementById('flux-globe-container');
      if (globeContainer) globeContainer.classList.add('hidden');
      if (el) el.classList.remove('hidden');

      if (this.rocketTimer) {
        clearInterval(this.rocketTimer);
        this.rocketTimer = null;
      }
      this.rocketAnims = [];

      if (this.globeTimer) {
        clearInterval(this.globeTimer);
        this.globeTimer = null;
      }

      if (this.map) {
        this.map.remove();
        this.map = null;
      }

      this.map = L.map(el, {
        zoomControl: false,
        worldCopyJump: true,
        minZoom: 2,
        maxZoom: 10,
      }).setView([this.originLat, this.originLon], 2);

      L.control.zoom({ position: 'bottomleft' }).addTo(this.map);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20,
      }).addTo(this.map);

      this.layerGroup = L.layerGroup().addTo(this.map);

      const targetLL = [this.originLat, this.originLon];
      L.marker(targetLL, {
        icon: L.divIcon({
          className: 'flux-ct-target-marker',
          html: '<div class="flux-target-dot"></div>',
          iconSize: [18, 18],
          iconAnchor: [9, 9],
        }),
        zIndexOffset: 1000,
      }).addTo(this.layerGroup);

      (this.points || []).forEach((p, idx) => {
        const from = [p.source_lat, p.source_lon];
        const to = [p.target_lat, p.target_lon];
        const bulge = 0.26 + (idx % 9) * 0.028;
        const arc = this.curvedLatLngs(from, to, bulge);
        const color = this.colorForCountry(p.source_country);
        const distKm = this.approxDistanceKm(from, to);
        // Closer routes move faster.
        const speed = distKm < 2500 ? 4 : distKm < 7000 ? 3 : 2;

        // Rocket-stream animation: moving dot along the arc.
        const dot = L.circleMarker(arc[0], {
          radius: 3.3,
          color,
          fillColor: color,
          fillOpacity: 0.95,
          weight: 1,
          opacity: 0.95,
        }).addTo(this.layerGroup);
        const tailLen = 12 + (idx % 5);
        const trail = L.polyline([], { color, weight: 3, opacity: 0.95, lineCap: 'round' }).addTo(this.layerGroup);
        this.rocketAnims.push({
          arc,
          dot,
          trail,
          t: idx % arc.length,
          step: speed + (idx % 2),
          tailLen,
        });

        L.marker(from, {
          icon: L.divIcon({
            className: 'flux-ct-src-marker',
            html: '<div class="flux-src-dot" style="background:' + color + ';box-shadow:0 0 12px ' + color + ';border-color:rgba(255,255,255,.6)"></div>',
            iconSize: [12, 12],
            iconAnchor: [6, 6],
          }),
        }).addTo(this.layerGroup).bindPopup(
          `<div class="text-xs"><strong>${p.source_city || ''}</strong> (${p.source_country || ''})<br/>${p.attack_type || ''} · hits ${p.count ?? ''}</div>`,
          { className: 'flux-popup' }
        );
      });

      // Single animation loop for all rocket dots.
      this.rocketTimer = setInterval(() => {
        if (this.viewMode !== 'plane') return;
        for (const a of this.rocketAnims) {
          a.t += a.step;
          if (a.t >= a.arc.length) a.t = 0;
          a.dot.setLatLng(a.arc[a.t]);

          // Update rocket tail polyline.
          const len = a.arc.length;
          const tailLen = Math.min(a.tailLen || 12, len - 1);
          const tail = [];
          const start = Math.max(0, a.t - tailLen + 1);
          for (let idx = start; idx <= a.t; idx++) {
            tail.push(a.arc[idx]);
          }
          if (a.trail) a.trail.setLatLngs(tail);
        }
      }, 55);

      setTimeout(() => { if (this.map) this.map.invalidateSize(); }, 200);
      setTimeout(() => { if (this.map) this.map.invalidateSize(); }, 600);
    },

    projectGlobe(lat, lon) {
      if (this.globeProjection) {
        const p = this.globeProjection([lon, lat]);
        if (!p) return null;
        return { x: p[0], y: p[1] };
      }
      // Fallback projection when d3 isn't available.
      const toRad = (d) => d * Math.PI / 180;
      const latRad = toRad(lat);
      const lonRad = toRad(lon);
      const lat0 = toRad(this.originLat);
      const lon0 = toRad(this.originLon);
      const dLon = lonRad - lon0;

      const cosc = Math.sin(lat0) * Math.sin(latRad) + Math.cos(lat0) * Math.cos(latRad) * Math.cos(dLon);
      if (cosc < 0) return null;

      const x = Math.cos(latRad) * Math.sin(dLon);
      const y = Math.cos(lat0) * Math.sin(latRad) - Math.sin(lat0) * Math.cos(latRad) * Math.cos(dLon);
      const cx = this.globeW / 2;
      const cy = this.globeH / 2;
      const R = this.globeR;
      return { x: cx + x * R, y: cy - y * R };
    },

    drawFallbackContinents(c) {
      // Coarse continent silhouettes for offline/no-CDN fallback.
      const polys = [
        [[72, -150],[60,-130],[50,-120],[45,-110],[40,-100],[30,-90],[20,-85],[15,-95],[20,-110],[25,-120],[35,-130],[50,-140],[65,-150]], // N. America
        [[10,-82],[5,-80],[-5,-75],[-15,-70],[-25,-65],[-35,-60],[-45,-64],[-55,-70],[-50,-78],[-35,-75],[-20,-70],[-5,-72],[6,-78]], // S. America
        [[72,-10],[70,10],[65,25],[60,40],[55,55],[52,70],[50,90],[45,110],[40,130],[35,150],[25,160],[15,145],[10,120],[20,95],[25,80],[30,60],[35,40],[40,25],[45,10],[52,-2],[60,-8],[68,-12]], // Eurasia
        [[35,-18],[30,-5],[24,10],[18,20],[10,28],[2,32],[-8,35],[-18,30],[-25,20],[-30,12],[-35,5],[-30,-5],[-22,-10],[-10,-5],[5,-2],[15,-5],[25,-10],[32,-15]], // Africa
        [[-12,113],[-18,120],[-24,130],[-30,140],[-36,150],[-40,146],[-42,136],[-38,126],[-30,118],[-22,112],[-15,110]], // Australia
      ];
      for (const poly of polys) {
        let started = false;
        c.beginPath();
        for (const [lat, lon] of poly) {
          const pr = this.projectGlobe(lat, lon);
          if (!pr) continue;
          if (!started) { c.moveTo(pr.x, pr.y); started = true; }
          else c.lineTo(pr.x, pr.y);
        }
        if (started) {
          c.closePath();
          c.fillStyle = 'rgba(71,85,105,0.30)';
          c.fill();
          c.strokeStyle = 'rgba(100,116,139,0.22)';
          c.lineWidth = 0.6;
          c.stroke();
        }
      }
    },

    drawGlobe() {
      if (typeof Globe !== 'undefined') {
        this.drawGlobe3dLib();
        return;
      }

      const canvas = document.getElementById('flux-globe-canvas');
      if (!canvas) return;
      const leafletEl = document.getElementById('flux-leaflet-map');
      if (leafletEl) leafletEl.classList.add('hidden');
      const globeContainer = document.getElementById('flux-globe-container');
      if (globeContainer) globeContainer.classList.add('hidden');
      canvas.classList.remove('hidden');

      if (this.globeTimer) {
        clearInterval(this.globeTimer);
        this.globeTimer = null;
      }
      this.globeArcs = [];

      const ctx = canvas.getContext('2d');
      if (!ctx) return;

      const dpr = window.devicePixelRatio || 1;
      const parent = canvas.parentElement;
      const rect = parent ? parent.getBoundingClientRect() : canvas.getBoundingClientRect();
      const w = Math.max(1, Math.floor(rect.width));
      const h = Math.max(1, Math.floor(rect.height));

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';

      // Work in CSS pixels for simpler math.
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      this.globeCtx = ctx;
      this.globeW = w;
      this.globeH = h;
      this.globeR = Math.floor(Math.min(w, h) * 0.46);

      let geoPath = null;
      if (typeof d3 !== 'undefined' && d3.geoOrthographic) {
        this.globeProjection = d3.geoOrthographic()
          .center([0, 0])
          .rotate([this.globeRotateLon, this.globeRotateLat, 0])
          .translate([this.globeW / 2, this.globeH / 2])
          .scale(this.globeR)
          .clipAngle(90);
        geoPath = d3.geoPath(this.globeProjection, ctx);
      } else {
        this.globeProjection = null;
      }

      const maxArcs = Math.min(18, (this.points || []).length);
      for (let i = 0; i < maxArcs; i++) {
        const p = this.points[i];
        const from = [p.source_lat, p.source_lon];
        const to = [p.target_lat, p.target_lon];
        const bulge = 0.26 + (i % 9) * 0.028;
        const arcLatLng = this.curvedLatLngs(from, to, bulge);
        const color = this.colorForCountry(p.source_country);
        const distKm = this.approxDistanceKm(from, to);
        const speed = distKm < 2500 ? 4 : distKm < 7000 ? 3 : 2;

        this.globeArcs.push({
          latlng: arcLatLng,
          pts: [],
          t: i % arcLatLng.length,
          step: speed + (i % 2),
          color,
        });
      }

      const renderFrame = () => {
        if (this.viewMode !== 'globe') return;
        const c = this.globeCtx;
        if (!c) return;

        const cx = this.globeW / 2;
        const cy = this.globeH / 2;
        const R = this.globeR;

        c.clearRect(0, 0, this.globeW, this.globeH);

        // Ocean sphere (stronger so globe mode looks distinct from plane mode).
        const g = c.createRadialGradient(cx - R * 0.35, cy - R * 0.35, 8, cx, cy, R);
        g.addColorStop(0, 'rgba(14,165,233,0.32)');
        g.addColorStop(0.5, 'rgba(8,47,73,0.72)');
        g.addColorStop(1, 'rgba(2,6,23,0.96)');
        c.beginPath();
        c.arc(cx, cy, R, 0, Math.PI * 2);
        c.fillStyle = g;
        c.fill();

        // Landmass map on globe (if loaded).
        if (geoPath && this.globeLandFeatures && this.globeLandFeatures.length) {
          c.save();
          c.beginPath();
          c.arc(cx, cy, R, 0, Math.PI * 2);
          c.clip();
          for (const f of this.globeLandFeatures) {
            c.beginPath();
            geoPath(f);
            c.fillStyle = 'rgba(34,197,94,0.28)';
            c.fill();
            c.strokeStyle = 'rgba(134,239,172,0.26)';
            c.lineWidth = 0.6;
            c.stroke();
          }
          c.restore();
        } else {
          this.drawFallbackContinents(c);
        }

        // Sphere edge + 3D shading.
        c.beginPath();
        c.arc(cx, cy, R, 0, Math.PI * 2);
        c.strokeStyle = 'rgba(148,163,184,0.22)';
        c.lineWidth = 1;
        c.stroke();

        // Terminator shadow.
        c.save();
        c.beginPath();
        c.arc(cx, cy, R, 0, Math.PI * 2);
        c.clip();
        const shadow = c.createLinearGradient(cx - R, cy, cx + R, cy);
        shadow.addColorStop(0, 'rgba(0,0,0,0.00)');
        shadow.addColorStop(0.55, 'rgba(0,0,0,0.08)');
        shadow.addColorStop(1, 'rgba(2,6,23,0.60)');
        c.fillStyle = shadow;
        c.fillRect(cx - R, cy - R, 2 * R, 2 * R);
        c.restore();

        // Graticules (meridians/parallels) for globe shape.
        c.save();
        c.beginPath();
        c.arc(cx, cy, R, 0, Math.PI * 2);
        c.clip();
        c.lineWidth = 1;
        c.strokeStyle = 'rgba(148,163,184,0.14)';
        c.setLineDash([2, 3]);

        // Meridians
        for (let dl = -150; dl <= 150; dl += 30) {
          const lon = this.originLon + dl;
          let started = false;
          c.beginPath();
          for (let lat = -85; lat <= 85; lat += 5) {
            const pr = this.projectGlobe(lat, lon);
            if (!pr) {
              if (started) { c.stroke(); started = false; }
              continue;
            }
            if (!started) { c.moveTo(pr.x, pr.y); started = true; }
            else { c.lineTo(pr.x, pr.y); }
          }
          if (started) c.stroke();
        }

        // Parallels
        for (let lat = -60; lat <= 60; lat += 30) {
          let started = false;
          c.beginPath();
          for (let lon = -180; lon <= 180; lon += 5) {
            const pr = this.projectGlobe(lat, lon);
            if (!pr) {
              if (started) { c.stroke(); started = false; }
              continue;
            }
            if (!started) { c.moveTo(pr.x, pr.y); started = true; }
            else { c.lineTo(pr.x, pr.y); }
          }
          if (started) c.stroke();
        }

        c.setLineDash([]);
        c.restore();

        // Rocket arcs: tail + head.
        for (let i = 0; i < this.globeArcs.length; i++) {
          const a = this.globeArcs[i];
          a.pts = [];
          for (const ll of a.latlng || []) {
            const pr = this.projectGlobe(ll[0], ll[1]);
            if (pr) a.pts.push(pr);
          }
          const len = a.pts.length;
          if (len < 2) continue;
          const head = Math.min(a.t, len - 1);
          const tailLen = Math.min(18, len - 1);

          // Tail segments with fading alpha
          const start = Math.max(0, head - tailLen + 1);
          for (let idx = start + 1; idx <= head; idx++) {
            const idx1 = idx - 1;
            const idx2 = idx;
            const seg = idx - start;
            const alpha = (seg / Math.max(1, tailLen)) * 0.6;

            c.beginPath();
            c.moveTo(a.pts[idx1].x, a.pts[idx1].y);
            c.lineTo(a.pts[idx2].x, a.pts[idx2].y);
            const rgb = this.hexToRgb(a.color || '#fb923c');
            c.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
            c.lineWidth = 3;
            c.stroke();
          }

          // Head glow
          const pt = a.pts[head];
          const rgb = this.hexToRgb(a.color || '#fb923c');
          c.save();
          c.shadowBlur = 16;
          c.shadowColor = `rgba(${rgb.r},${rgb.g},${rgb.b},0.55)`;
          c.beginPath();
          c.arc(pt.x, pt.y, 3.5, 0, Math.PI * 2);
          c.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.98)`;
          c.fill();
          c.restore();
        }

        // Advance dots.
        for (const a of this.globeArcs) {
          a.t += a.step;
          if (a.t >= (a.latlng || []).length) a.t = 0;
        }
      };

      renderFrame();
      this.globeTimer = setInterval(renderFrame, 55);
      this.bindGlobeInteractions(canvas);
    },

    drawGlobe3dLib() {
      const container = document.getElementById('flux-globe-container');
      if (!container) return;
      const leafletEl = document.getElementById('flux-leaflet-map');
      if (leafletEl) leafletEl.classList.add('hidden');
      const canvas = document.getElementById('flux-globe-canvas');
      if (canvas) canvas.classList.add('hidden');
      container.classList.remove('hidden');

      if (this.globeTimer) {
        clearInterval(this.globeTimer);
        this.globeTimer = null;
      }

      const rect = container.getBoundingClientRect();
      const width = Math.max(280, Math.floor(rect.width || container.clientWidth || 0));
      const height = Math.max(240, Math.floor(rect.height || container.clientHeight || 0));
      if (width < 10 || height < 10) return;

      try {
      const shortSide = Math.min(width, height);
      // Bigger labels on small viewports (angular degrees on globe)
      const labelSize = Math.min(1.15, Math.max(0.55, shortSide / 380));
      const labelDot = Math.min(0.18, Math.max(0.1, labelSize * 0.24));
      const labelRes = shortSide < 520 ? 5 : 4;
      const ptRadius = shortSide < 480 ? 0.34 : shortSide < 900 ? 0.28 : 0.24;
      const arcStroke = shortSide < 480 ? 0.75 : 0.6;
      // Slightly pull camera back on narrow screens so globe feels centered in the stage
      const povAlt = width < 400 ? 2.65 : width < 640 ? 2.4 : width < 1024 ? 2.25 : 2.1;

      if (!this.globe3d) {
        this.globe3d = Globe()(container)
          .backgroundColor('rgba(0,0,0,0)')
          .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
          .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
          .atmosphereColor('#67e8f9')
          .atmosphereAltitude(0.19)
          .arcStroke(arcStroke)
          .arcDashLength(0.42)
          .arcDashGap(0.8)
          .arcDashInitialGap(() => Math.random())
          .arcDashAnimateTime(1400)
          .arcLabel('tip')
          .pointAltitude(0.03)
          .pointResolution(12)
          .pointLabel('tip')
          .labelsData([])
          .labelLat('lat')
          .labelLng('lng')
          .labelText('text')
          .labelColor('color')
          .labelAltitude(0.02)
          .labelIncludeDot(true)
          .labelDotOrientation('bottom')
          .labelLabel('text');
      }

      this.globe3d
        .width(width)
        .height(height)
        .labelSize(labelSize)
        .labelDotRadius(labelDot)
        .labelResolution(labelRes)
        .pointRadius(ptRadius)
        .arcStroke(arcStroke);

      // 0ms: safe when layout is corrected immediately after (class change / ResizeObserver)
      this.globe3d.pointOfView(
        { lat: this.originLat || -2.5, lng: this.originLon || 118, altitude: povAlt },
        0
      );

      const points = (this.points || []).map((p) => {
        const name = this.displayCountryName(p.source_country);
        return {
          lat: Number(p.source_lat),
          lng: Number(p.source_lon),
          color: this.colorForCountry(p.source_country),
          tip: name || 'Unknown',
        };
      }).filter((p) => Number.isFinite(p.lat) && Number.isFinite(p.lng));

      const arcs = (this.points || []).slice(0, 120).map((p) => {
        const color = this.colorForCountry(p.source_country);
        const countryName = this.displayCountryName(p.source_country);
        return {
        startLat: Number(p.source_lat),
        startLng: Number(p.source_lon),
        endLat: Number(p.target_lat),
        endLng: Number(p.target_lon),
        // Keep line color style close to plane mode: same hue, fading tail.
        color: [color, color + '55'],
        tip: countryName || 'Unknown',
        };
      }).filter((a) =>
        Number.isFinite(a.startLat) && Number.isFinite(a.startLng) &&
        Number.isFinite(a.endLat) && Number.isFinite(a.endLng)
      );

      const targetCountryCode = (this.points && this.points[0] && this.points[0].target_country)
        ? String(this.points[0].target_country).trim().toUpperCase() : '';
      const targetCountryName = targetCountryCode ? this.displayCountryName(targetCountryCode) : '';

      const targetPoint = Number.isFinite(this.originLat) && Number.isFinite(this.originLon)
        ? [{
            lat: this.originLat,
            lng: this.originLon,
            color: '#22c55e',
            tip: targetCountryName || '',
          }]
        : [];

      // One label per source country (centroid of sample points) + target country label.
      const byCountry = new Map();
      for (const p of this.points || []) {
        const code = String(p.source_country || '').trim().toUpperCase();
        if (!code || code === 'ZZ') continue;
        const lat = Number(p.source_lat);
        const lng = Number(p.source_lon);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) continue;
        let agg = byCountry.get(code);
        if (!agg) {
          agg = { code, sumLat: 0, sumLng: 0, n: 0 };
          byCountry.set(code, agg);
        }
        agg.sumLat += lat;
        agg.sumLng += lng;
        agg.n += 1;
      }
      const countryLabels = [];
      for (const agg of byCountry.values()) {
        const name = this.displayCountryName(agg.code);
        const rgb = this.hexToRgb(this.colorForCountry(agg.code));
        countryLabels.push({
          lat: agg.sumLat / agg.n,
          lng: agg.sumLng / agg.n,
          text: name,
          color: `rgba(${rgb.r},${rgb.g},${rgb.b},0.92)`,
        });
      }
      if (Number.isFinite(this.originLat) && Number.isFinite(this.originLon) && targetCountryName) {
        countryLabels.push({
          lat: this.originLat,
          lng: this.originLon,
          text: targetCountryName,
          color: 'rgba(34, 197, 94, 0.95)',
        });
      }

      this.globe3d
        .pointsData(points.concat(targetPoint))
        .pointColor('color')
        .arcsData(arcs)
        .labelsData(countryLabels);
      } finally {
        this.resumeGlobe3dRender();
      }
    },

    bindGlobeInteractions(canvas) {
      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

      const startDrag = (x, y) => {
        this.globeDragging = true;
        this.globeDragStartX = x;
        this.globeDragStartY = y;
        this.globeDragStartLon = this.globeRotateLon;
        this.globeDragStartLat = this.globeRotateLat;
      };
      const moveDrag = (x, y) => {
        if (!this.globeDragging || this.viewMode !== 'globe') return;
        const dx = x - this.globeDragStartX;
        const dy = y - this.globeDragStartY;
        this.globeRotateLon = this.globeDragStartLon + dx * 0.35;
        this.globeRotateLat = clamp(this.globeDragStartLat - dy * 0.28, -75, 75);
        if (this.globeProjection) {
          this.globeProjection.rotate([this.globeRotateLon, this.globeRotateLat, 0]);
        }
      };
      const endDrag = () => {
        this.globeDragging = false;
      };

      // Mouse
      canvas.onmousedown = (e) => startDrag(e.clientX, e.clientY);
      window.onmousemove = (e) => moveDrag(e.clientX, e.clientY);
      window.onmouseup = () => endDrag();

      // Touch
      canvas.ontouchstart = (e) => {
        if (!e.touches || !e.touches[0]) return;
        const t = e.touches[0];
        startDrag(t.clientX, t.clientY);
      };
      canvas.ontouchmove = (e) => {
        if (!e.touches || !e.touches[0]) return;
        const t = e.touches[0];
        moveDrag(t.clientX, t.clientY);
      };
      canvas.ontouchend = () => endDrag();
    },

    renderView() {
      if (this.viewMode === 'globe') this.drawGlobe();
      else this.drawMap();
    },

    setViewMode(mode) {
      this.viewMode = mode === 'globe' ? 'globe' : 'plane';
      this.renderView();
      // Remeasure after Alpine applies bottom offset above mobile feed panel.
      if (this.viewMode === 'globe' && typeof Globe !== 'undefined') {
        requestAnimationFrame(() => requestAnimationFrame(() => this.drawGlobe3dLib()));
      }
    },

    onWindowResize() {
      if (this.viewMode !== 'globe') return;
      requestAnimationFrame(() => {
        if (this.viewMode !== 'globe') return;
        if (typeof Globe !== 'undefined' && this.globe3d) {
          this.drawGlobe3dLib();
          return;
        }
        this.drawGlobe();
      });
    },

    startLoop() {
      if (this.loopTimer) clearInterval(this.loopTimer);
      if (!this.allLogs.length) return;
      let i = 0;
      this.loopTimer = setInterval(() => {
        const e = this.allLogs[i % this.allLogs.length];
        this.feed.unshift({ ...e, _key: 't-' + Date.now() + '-' + i });
        if (this.feed.length > 18) this.feed.pop();
        i++;
      }, 1400);
    },

    async init() {
      this.startClock();
      window.addEventListener('resize', () => this.onWindowResize());
      const mapStage = document.getElementById('flux-map-stage');
      if (mapStage && typeof ResizeObserver !== 'undefined') {
        if (this._fluxMapResizeObs) this._fluxMapResizeObs.disconnect();
        this._fluxMapResizeObs = new ResizeObserver(() => {
          if (this.viewMode !== 'globe') return;
          requestAnimationFrame(() => {
            if (this.viewMode === 'globe') this.drawGlobe3dLib();
          });
        });
        this._fluxMapResizeObs.observe(mapStage);
      }
      try {
        // Optional world landmass for globe (non-blocking).
        try {
          const topo = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json());
          this.globeLandFeatures = topojson.feature(topo, topo.objects.countries).features || [];
        } catch (_) {
          this.globeLandFeatures = null;
        }

        const r = await fetch('/api/attack-map');
        const d = await r.json();
        this.demo = !!d.demo;
        this.label = d.label || '';
        this.totalToday = d.total_today || 0;
        this.categories = Array.isArray(d.categories) ? d.categories : [];
        this.catMax = Math.max(1, ...this.categories.map((c) => c.count));

        this.points = Array.isArray(d.points) ? d.points : [];
        const logs = Array.isArray(d.logs_24h) ? d.logs_24h : [];
        this.allLogs = logs.slice().sort((a, b) => new Date(b.ts) - new Date(a.ts));

        if (this.points.length && this.points[0].target_lat != null) {
          this.originLat = this.points[0].target_lat;
          this.originLon = this.points[0].target_lon;
        }
        // Start globe looking at protected origin.
        this.globeRotateLon = -this.originLon;
        this.globeRotateLat = -this.originLat;

        this.feed = this.allLogs.slice(0, 14).map((e, i) => ({ ...e, _key: 'init-' + i }));
        this.startLoop();

        setTimeout(() => this.renderView(), 50);
        setTimeout(() => this.renderView(), 280);
      } catch (e) {
        this.label = 'Gagal memuat data: ' + (e.message || e);
      }
    },
  };
}
