{{define "content"}}
<div class="max-w-5xl space-y-4" x-data="eventLogsApp()" x-init="init()">

  <div class="flex items-center justify-between gap-4 flex-wrap">
    <p class="text-gray-400 text-sm max-w-2xl">
      Stream real-time untuk <span class="font-mono text-gray-500">nginx error.log</span>.
      Cocok untuk melihat pesan seperti <span class="font-mono text-gray-500">coraza dynlib_open</span>, invalid PID, dan lain-lain.
    </p>
    <div class="flex items-center gap-2 flex-wrap">
      <label class="text-xs text-gray-500">Limit</label>
      <select x-model.number="limit" @change="load()" class="text-sm bg-gray-900 border border-gray-700 rounded-lg px-2 py-2 text-gray-200">
        <option value="100">100</option>
        <option value="200">200</option>
        <option value="500">500</option>
      </select>
      <button type="button" @click="load()"
              class="flex items-center gap-2 text-sm font-medium text-emerald-400 border border-emerald-500/30 hover:bg-emerald-500/10 px-3 py-2 rounded-lg transition-colors">
        Refresh
      </button>
      <button type="button" @click="toggleAuto()" :class="auto ? 'bg-emerald-600' : 'bg-gray-700'"
              class="text-sm font-semibold text-white px-3 py-2 rounded-lg transition-colors">
        <span x-show="auto">Auto: ON</span>
        <span x-show="!auto">Auto: OFF</span>
      </button>
    </div>
  </div>

  <div class="text-xs text-gray-500 font-mono" x-show="path">
    Source: <span x-text="path"></span> · <span x-text="count"></span> lines
  </div>

  <div x-show="loading" x-cloak class="flex items-center justify-center py-10 text-gray-600 text-sm">
    Loading…
  </div>

  <div x-show="error" x-cloak class="rounded-xl border border-rose-500/30 bg-rose-500/10 text-rose-200 text-sm px-4 py-3" x-text="error"></div>

  <div class="rounded-xl border border-gray-800 bg-gray-900/40 overflow-hidden" x-show="!loading && !error">
    <div class="px-4 py-2 border-b border-gray-800 text-xs text-gray-500 font-semibold uppercase tracking-wider flex items-center justify-between gap-3">
      <span>Event stream</span>
      <span x-text="levelSummary"></span>
    </div>
    <div class="overflow-y-auto max-h-[560px]">
      <table class="w-full text-sm">
        <thead class="sticky top-0 bg-gray-900/80 backdrop-blur border-b border-gray-800 z-10">
          <tr class="text-xs font-semibold text-gray-500 uppercase tracking-wider">
            <th class="text-left px-4 py-2 w-28">Level</th>
            <th class="text-left px-4 py-2">Message</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-800/70 font-mono text-xs">
          <template x-for="(l, idx) in lines" :key="idx">
            <tr class="hover:bg-gray-800/30">
              <td class="px-4 py-2">
                <span class="px-2 py-0.5 rounded border"
                      :class="levelClass(l.level)">
                  <span x-text="l.level || 'info'"></span>
                </span>
              </td>
              <td class="px-4 py-2 text-gray-300 break-words" x-text="l.line || l.raw"></td>
            </tr>
          </template>
          <tr x-show="!lines.length">
            <td colspan="2" class="px-4 py-12 text-center text-gray-600">Tidak ada log.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
function eventLogsApp() {
  return {
    loading: true,
    error: '',
    path: '',
    count: 0,
    limit: 200,
    lines: [],
    auto: true,
    timer: null,
    levelSummary: '',

    levelClass(level) {
      const lv = String(level || '').toLowerCase();
      if (lv === 'emerg' || lv === 'alert' || lv === 'crit') return 'text-rose-300 border-rose-500/30 bg-rose-500/10';
      if (lv === 'error') return 'text-amber-300 border-amber-500/30 bg-amber-500/10';
      if (lv === 'warn' || lv === 'warning') return 'text-amber-300 border-amber-500/30 bg-amber-500/10';
      if (lv === 'notice') return 'text-cyan-300 border-cyan-500/30 bg-cyan-500/10';
      return 'text-gray-400 border-gray-700 bg-gray-800';
    },

    summarize() {
      const c = { emerg: 0, alert: 0, error: 0, warn: 0, notice: 0, info: 0, unknown: 0 };
      for (const l of (this.lines || [])) {
        const lv = String(l.level || '').toLowerCase();
        if (lv in c) c[lv] += 1;
        else c.unknown += 1;
      }
      this.levelSummary = `emerg:${c.emerg} alert:${c.alert} error:${c.error} warn:${c.warn} notice:${c.notice}`;
    },

    async load() {
      this.loading = true;
      this.error = '';
      try {
        const r = await fetch('/api/logs/events?limit=' + encodeURIComponent(this.limit));
        if (!r.ok) throw new Error(await r.text() || r.statusText);
        const d = await r.json();
        this.path = d.path || '';
        this.count = d.count || 0;
        this.lines = Array.isArray(d.lines) ? d.lines : [];
        this.summarize();
      } catch (e) {
        this.error = e.message || String(e);
        this.lines = [];
      } finally {
        this.loading = false;
      }
    },

    toggleAuto() {
      this.auto = !this.auto;
      if (this.auto) {
        this.startTimer();
      } else if (this.timer) {
        clearInterval(this.timer);
        this.timer = null;
      }
    },

    startTimer() {
      if (this.timer) clearInterval(this.timer);
      this.timer = setInterval(() => {
        if (!this.auto) return;
        this.load();
      }, 2500);
    },

    init() {
      this.load();
      this.startTimer();
    }
  };
}
</script>
{{end}}
