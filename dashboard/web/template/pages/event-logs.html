{{define "content"}}
<div class="w-full min-h-[calc(100vh-6.5rem)] flex flex-col gap-4" x-data="eventLogsApp()" x-init="init()">
  <div class="flex items-end justify-between gap-4 flex-wrap">
    <div>
      <h2 class="text-xl font-semibold text-white">Logs Event</h2>
      <p class="text-xs text-gray-500 mt-0.5">Real-time system and nginx event log stream</p>
    </div>
  </div>

  <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
    <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
      <p class="text-2xl font-bold text-white tabular-nums" x-text="count">0</p>
      <p class="text-xs text-gray-500">Lines loaded</p>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
      <p class="text-2xl font-bold text-rose-400 tabular-nums" x-text="sev.error + sev.alert + sev.emerg">0</p>
      <p class="text-xs text-gray-500">Errors</p>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
      <p class="text-2xl font-bold text-amber-400 tabular-nums" x-text="sev.warn">0</p>
      <p class="text-xs text-gray-500">Warnings</p>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
      <p class="text-2xl font-bold text-emerald-400 tabular-nums" x-text="sev.notice + sev.info">0</p>
      <p class="text-xs text-gray-500">Info / OK</p>
    </div>
  </div>

  <div class="rounded-xl border border-gray-800 bg-gray-900/40 overflow-hidden flex flex-col min-h-0 flex-1">
    <div class="px-3 py-2 border-b border-gray-800 flex flex-wrap items-center gap-2">
      <select x-model="source" @change="load()"
              class="text-xs bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-gray-200">
        <option value="nginx-error">Nginx Error Log</option>
      </select>
      <select x-model.number="limit" @change="load()"
              class="text-xs bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-gray-200">
        <option value="50">Last 50</option>
        <option value="100">Last 100</option>
        <option value="200">Last 200</option>
        <option value="500">Last 500</option>
      </select>
      <select x-model="levelFilter"
              class="text-xs bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-gray-200">
        <option value="all">All levels</option>
        <option value="error">Errors only</option>
        <option value="warn">Warnings</option>
        <option value="notice">Notice/Info</option>
      </select>

      <input type="text" x-model="search" placeholder="Search..."
             class="min-w-[200px] flex-1 text-xs bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-gray-200 placeholder:text-gray-600" />
      <button type="button" @click="search=''"
              class="text-xs font-medium text-gray-300 bg-gray-800 border border-gray-700 hover:bg-gray-700 px-2.5 py-1.5 rounded-md transition-colors">
        Clear
      </button>

      <button type="button" @click="load()"
              class="ml-auto flex items-center gap-1.5 text-xs font-medium text-emerald-300 bg-emerald-500/15 border border-emerald-500/30 hover:bg-emerald-500/20 px-3 py-1.5 rounded-md transition-colors">
        Refresh
      </button>
      <label class="inline-flex items-center gap-1.5 text-xs text-gray-400">
        <input type="checkbox" x-model="autoRefresh" @change="restartTimer()" class="accent-emerald-500">
        Auto-refresh
      </label>
      <select x-model.number="refreshMs" @change="restartTimer()"
              class="text-xs bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-gray-200"
              :disabled="!autoRefresh">
        <option value="1000">1s</option>
        <option value="2000">2s</option>
        <option value="5000">5s</option>
        <option value="10000">10s</option>
      </select>
      <label class="inline-flex items-center gap-1.5 text-xs text-gray-400">
        <input type="checkbox" x-model="autoScroll" class="accent-emerald-500">
        Auto-scroll
      </label>
    </div>

    <div x-show="error" x-cloak class="m-3 rounded-lg border border-rose-500/30 bg-rose-500/10 text-rose-200 text-sm px-3 py-2" x-text="error"></div>

    <div id="eventLogPane" class="flex-1 min-h-0 overflow-y-auto font-mono text-[12px] leading-5 bg-[#060b16] px-3 py-2">
      <template x-for="(l, idx) in filteredLines()" :key="idx">
        <div class="grid grid-cols-[auto_1fr] gap-2 py-0.5 hover:bg-white/[0.02] rounded px-1">
          <span class="inline-flex items-center px-1.5 h-5 rounded text-[10px] border w-fit"
                :class="levelClass(l.level)"
                x-text="(l.level || 'info').toLowerCase()"></span>
          <span class="text-gray-300 break-all" x-text="l.line || l.raw"></span>
        </div>
      </template>
      <p x-show="!filteredLines().length && !loading" class="text-gray-600 text-sm py-6 text-center">No logs found.</p>
      <p x-show="loading" class="text-gray-500 text-sm py-6 text-center">Loading...</p>
    </div>

    <div class="px-3 py-1.5 border-t border-gray-800 text-[11px] text-gray-600 flex items-center justify-between">
      <span x-text="(filteredLines().length + ' lines') + (path ? ' · source: ' + path : '')"></span>
      <button type="button" @click="copyShown()"
              class="text-gray-400 hover:text-gray-200 transition-colors">Copy shown</button>
    </div>
  </div>
</div>

<script>
function eventLogsApp() {
  return {
    loading: true,
    error: '',
    path: '',
    count: 0,
    limit: 200,
    source: 'nginx-error',
    levelFilter: 'all',
    search: '',
    lines: [],
    autoRefresh: true,
    autoScroll: true,
    refreshMs: 2000,
    timer: null,
    sev: { emerg: 0, alert: 0, error: 0, warn: 0, notice: 0, info: 0 },

    levelClass(level) {
      const lv = String(level || '').toLowerCase();
      if (lv === 'emerg' || lv === 'alert' || lv === 'crit') return 'text-rose-200 border-rose-500/35 bg-rose-500/14';
      if (lv === 'error') return 'text-rose-200 border-rose-500/35 bg-rose-500/14';
      if (lv === 'warn' || lv === 'warning') return 'text-amber-200 border-amber-500/35 bg-amber-500/14';
      if (lv === 'notice' || lv === 'info') return 'text-emerald-200 border-emerald-500/35 bg-emerald-500/12';
      return 'text-cyan-200 border-cyan-500/35 bg-cyan-500/12';
    },
    summarize() {
      const c = { emerg: 0, alert: 0, error: 0, warn: 0, notice: 0, info: 0 };
      for (const l of this.lines || []) {
        const lv = String(l.level || '').toLowerCase();
        if (lv === 'emerg') c.emerg++;
        else if (lv === 'alert' || lv === 'crit') c.alert++;
        else if (lv === 'error') c.error++;
        else if (lv === 'warn' || lv === 'warning') c.warn++;
        else if (lv === 'notice') c.notice++;
        else c.info++;
      }
      this.sev = c;
    },
    filteredLines() {
      let rows = this.lines || [];
      if (this.levelFilter === 'error') {
        rows = rows.filter((l) => ['error', 'alert', 'emerg', 'crit'].includes(String(l.level || '').toLowerCase()));
      } else if (this.levelFilter === 'warn') {
        rows = rows.filter((l) => ['warn', 'warning'].includes(String(l.level || '').toLowerCase()));
      } else if (this.levelFilter === 'notice') {
        rows = rows.filter((l) => ['notice', 'info'].includes(String(l.level || '').toLowerCase()));
      }
      const q = String(this.search || '').trim().toLowerCase();
      if (!q) return rows;
      return rows.filter((l) => String(l.line || l.raw || '').toLowerCase().includes(q));
    },
    scrollBottom() {
      if (!this.autoScroll) return;
      const pane = document.getElementById('eventLogPane');
      if (pane) pane.scrollTop = pane.scrollHeight;
    },
    async copyShown() {
      const rows = this.filteredLines().map((l) => l.line || l.raw || '');
      if (!rows.length) return;
      try {
        await navigator.clipboard.writeText(rows.join('\n'));
      } catch (_) {}
    },
    async load() {
      this.loading = true;
      this.error = '';
      try {
        const r = await fetch('/api/logs/events?limit=' + encodeURIComponent(this.limit));
        if (!r.ok) throw new Error(await r.text() || r.statusText);
        const d = await r.json();
        this.path = d.path || '';
        this.count = d.count || 0;
        this.lines = Array.isArray(d.lines) ? d.lines : [];
        this.summarize();
        requestAnimationFrame(() => this.scrollBottom());
      } catch (e) {
        this.error = e.message || String(e);
        this.lines = [];
      } finally {
        this.loading = false;
      }
    },
    restartTimer() {
      if (this.timer) clearInterval(this.timer);
      if (!this.autoRefresh) return;
      this.timer = setInterval(() => this.load(), this.refreshMs || 2000);
    },
    init() {
      this.load();
      this.restartTimer();
      window.addEventListener('pagehide', () => {
        if (this.timer) clearInterval(this.timer);
      }, { once: true });
    }
  };
}
</script>
{{end}}
