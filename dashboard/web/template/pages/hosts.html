{{define "content"}}
<div x-data="hostsApp()" x-init="init()">

  <!-- Page header -->
  <div class="flex items-center justify-between mb-6">
    <p class="text-gray-400 text-sm">Manage reverse proxy targets. Each host maps a domain to one or more backend servers.</p>
    <button @click="openAdd()"
            class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
        <path d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z"/>
      </svg>
      Add Host
    </button>
  </div>

  <!-- Loading -->
  <template x-if="loading">
    <div class="flex items-center justify-center py-20 text-gray-600">
      <svg class="animate-spin w-6 h-6 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 0 1 8-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      Loading hosts...
    </div>
  </template>

  <!-- Empty state -->
  <template x-if="!loading && hosts.length === 0">
    <div class="flex flex-col items-center justify-center py-20 text-center">
      <div class="w-14 h-14 rounded-2xl bg-gray-800 border border-gray-700 flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-7 h-7 text-gray-600">
          <path d="M4 5a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5ZM4 13a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-2Z"/>
        </svg>
      </div>
      <h3 class="text-white font-semibold mb-1">No hosts configured</h3>
      <p class="text-gray-500 text-sm mb-5">Add your first reverse proxy target to get started.</p>
      <button @click="openAdd()"
              class="bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-semibold px-5 py-2 rounded-lg transition-colors">
        Add first host
      </button>
    </div>
  </template>

  <!-- Hosts table -->
  <template x-if="!loading && hosts.length > 0">
    <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead class="border-b border-gray-800">
          <tr class="text-xs font-semibold text-gray-500 uppercase tracking-wider">
            <th class="text-left px-5 py-3">Domain</th>
            <th class="text-left px-5 py-3">Upstream(s)</th>
            <th class="text-left px-5 py-3">WAF Mode</th>
            <th class="text-left px-5 py-3">SSL</th>
            <th class="text-left px-5 py-3">LB</th>
            <th class="text-right px-5 py-3">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-800">
          <template x-for="host in hosts" :key="host.domain">
            <tr class="hover:bg-gray-800/40 transition-colors">
              <!-- Domain -->
              <td class="px-5 py-3.5">
                <div class="flex items-center gap-2">
                  <div :class="host.enabled ? 'bg-emerald-500' : 'bg-gray-600'"
                       class="w-1.5 h-1.5 rounded-full flex-shrink-0"></div>
                  <span class="font-mono text-white text-xs font-medium" x-text="host.domain"></span>
                </div>
              </td>
              <!-- Upstreams -->
              <td class="px-5 py-3.5">
                <div class="flex flex-wrap gap-1.5">
                  <template x-for="(srv, i) in (host.upstream_servers || [])" :key="i">
                    <span class="font-mono text-xs text-gray-300 bg-gray-800 border border-gray-700 px-2 py-0.5 rounded" x-text="srv"></span>
                  </template>
                </div>
              </td>
              <!-- WAF Mode -->
              <td class="px-5 py-3.5">
                <span :class="{
                    'text-emerald-400 bg-emerald-500/10 border-emerald-500/20': host.waf_mode === 'On',
                    'text-rose-400 bg-rose-500/10 border-rose-500/20': host.waf_mode === 'Off',
                    'text-yellow-400 bg-yellow-500/10 border-yellow-500/20': host.waf_mode === 'DetectionOnly'
                  }"
                  class="inline-flex items-center text-xs font-medium border px-2 py-0.5 rounded-full"
                  x-text="host.waf_mode || 'On'">
                </span>
              </td>
              <!-- SSL -->
              <td class="px-5 py-3.5 max-w-[14rem]">
                <template x-if="host.ssl_enabled">
                  <div class="space-y-0.5">
                    <span class="inline-flex items-center gap-1 text-xs text-emerald-400">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3.5 h-3.5 flex-shrink-0">
                        <path fill-rule="evenodd" d="M8 1a3.5 3.5 0 0 0-3.5 3.5V7A1.5 1.5 0 0 0 3 8.5v5A1.5 1.5 0 0 0 4.5 15h7a1.5 1.5 0 0 0 1.5-1.5v-5A1.5 1.5 0 0 0 11 7V4.5A3.5 3.5 0 0 0 8 1Zm2 6V4.5a2 2 0 1 0-4 0V7h4Z" clip-rule="evenodd"/>
                      </svg>
                      HTTPS
                    </span>
                    <p class="text-[11px] text-gray-500 font-mono truncate" :title="certSummary(host)" x-text="certSummary(host)"></p>
                  </div>
                </template>
                <template x-if="!host.ssl_enabled">
                  <span class="text-xs text-gray-600">HTTP only</span>
                </template>
              </td>
              <!-- LB -->
              <td class="px-5 py-3.5">
                <span class="text-xs text-gray-400 font-mono" x-text="host.lb_algorithm || 'round_robin'"></span>
              </td>
              <!-- Actions -->
              <td class="px-5 py-3.5 text-right">
                <div class="flex items-center justify-end gap-2">
                  <button @click="openEdit(host)"
                          class="text-gray-400 hover:text-white text-xs px-2.5 py-1 rounded-lg hover:bg-gray-700 transition-colors border border-gray-700">
                    Edit
                  </button>
                  <button @click="deleteHost(host.domain)"
                          class="text-rose-400 hover:text-rose-300 text-xs px-2.5 py-1 rounded-lg hover:bg-rose-500/10 transition-colors border border-rose-500/20">
                    Delete
                  </button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>

  <!-- ── Add / Edit Modal ──────────────────────────────────────────────────── -->
  <div x-show="showModal"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-100"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 px-4"
       @keydown.escape.window="showModal = false">

    <div @click.outside="showModal = false"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         class="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-xl shadow-2xl">

      <!-- Modal header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800">
        <h3 class="text-white font-semibold" x-text="isEdit ? 'Edit Host' : 'Add Host'"></h3>
        <button @click="showModal = false" class="text-gray-500 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
            <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"/>
          </svg>
        </button>
      </div>

      <!-- Modal body -->
      <form @submit.prevent="save()" class="px-6 py-5 space-y-4">

        <!-- Error -->
        <template x-if="error">
          <div class="flex items-center gap-2 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm px-4 py-2.5 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 flex-shrink-0">
              <path fill-rule="evenodd" d="M6.701 2.25c.577-1 2.02-1 2.598 0l5.196 9a1.5 1.5 0 0 1-1.299 2.25H2.804a1.5 1.5 0 0 1-1.3-2.25l5.197-9ZM8 4a.75.75 0 0 1 .75.75v3a.75.75 0 1 1-1.5 0v-3A.75.75 0 0 1 8 4Zm0 8a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/>
            </svg>
            <span x-text="error"></span>
          </div>
        </template>

        <!-- Domain -->
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5">Domain <span class="text-rose-400">*</span></label>
          <input x-model="form.domain" type="text" required :disabled="isEdit"
                 placeholder="example.com"
                 class="w-full bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3.5 py-2.5
                        placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500
                        disabled:opacity-50 disabled:cursor-not-allowed transition-colors font-mono">
        </div>

        <!-- Upstream servers -->
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5">
            Upstream Servers <span class="text-rose-400">*</span>
            <span class="text-gray-600 font-normal ml-1">— one per line, e.g. 172.17.0.1:3000</span>
          </label>
          <textarea x-model="form.upstream_servers" rows="3" required
                    placeholder="172.17.0.1:3000&#10;172.17.0.2:3000"
                    class="w-full bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3.5 py-2.5
                           placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500
                           transition-colors font-mono resize-none"></textarea>
        </div>

        <!-- WAF Mode + LB -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">WAF Mode</label>
            <select x-model="form.waf_mode"
                    class="w-full bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3.5 py-2.5
                           focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-colors">
              <option value="On">On (Block)</option>
              <option value="DetectionOnly">Detection Only</option>
              <option value="Off">Off</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">Load Balancing</label>
            <select x-model="form.lb_algorithm"
                    class="w-full bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3.5 py-2.5
                           focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-colors">
              <option value="round_robin">Round Robin</option>
              <option value="least_conn">Least Connections</option>
              <option value="ip_hash">IP Hash (sticky)</option>
            </select>
          </div>
        </div>

        <!-- SSL -->
        <div class="space-y-3 rounded-lg border border-gray-800 bg-gray-950/40 p-3">
          <div class="flex items-center justify-between gap-3">
            <div>
              <p class="text-sm text-white font-medium">HTTPS / SSL</p>
              <p class="text-xs text-gray-500">Pilih sertifikat terkelola dari <a href="/ssl" class="text-emerald-500 hover:text-emerald-400">SSL</a></p>
            </div>
            <button type="button" @click="form.ssl_enabled = !form.ssl_enabled"
                    :class="form.ssl_enabled ? 'bg-emerald-600' : 'bg-gray-700'"
                    class="relative inline-flex h-6 w-11 flex-shrink-0 items-center rounded-full transition-colors focus:outline-none">
              <span :class="form.ssl_enabled ? 'translate-x-6' : 'translate-x-1'"
                    class="inline-block h-4 w-4 rounded-full bg-white transition-transform"></span>
            </button>
          </div>
          <div x-show="form.ssl_enabled" x-cloak>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">TLS certificate</label>
            <select x-model="form.ssl_cert_id"
                    class="w-full bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3.5 py-2.5
                           focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-colors font-mono">
              <option value="">— Pilih sertifikat —</option>
              <template x-for="c in activeTlsCerts" :key="c.id">
                <option :value="c.id" x-text="tlsOptionLabel(c)"></option>
              </template>
            </select>
            <p class="text-xs text-amber-500/90 mt-1.5" x-show="form.ssl_enabled && activeTlsCerts.length === 0">
              Belum ada sertifikat aktif. Tambah di halaman SSL (Let&apos;s Encrypt atau paste PEM).
            </p>
          </div>
        </div>

        <!-- Footer -->
        <div class="flex items-center justify-end gap-3 pt-2 border-t border-gray-800">
          <button type="button" @click="showModal = false"
                  class="text-gray-400 hover:text-white text-sm px-4 py-2 rounded-lg hover:bg-gray-800 transition-colors">
            Cancel
          </button>
          <button type="submit"
                  :disabled="saving"
                  :class="saving ? 'opacity-60 cursor-not-allowed' : 'hover:bg-emerald-500'"
                  class="bg-emerald-600 text-white text-sm font-semibold px-5 py-2 rounded-lg transition-colors">
            <span x-text="saving ? 'Saving…' : (isEdit ? 'Save Changes' : 'Add Host')"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

</div>

<script>
function hostsApp() {
  return {
    hosts: [],
    tlsCerts: [],
    loading: true,
    showModal: false,
    isEdit: false,
    saving: false,
    error: '',
    form: {},

    get activeTlsCerts() {
      return (this.tlsCerts || []).filter(c => (c.status || '').toLowerCase() === 'active');
    },

    blank() {
      return { domain: '', upstream_servers: '', waf_mode: 'On', lb_algorithm: 'round_robin', ssl_enabled: false, ssl_cert_id: '', enabled: true };
    },

    tlsOptionLabel(c) {
      const src = c.source === 'letsencrypt' ? 'LE' : 'custom';
      return c.domain + ' (' + src + ')';
    },

    certSummary(host) {
      if (!host.ssl_enabled) return '';
      const id = host.ssl_cert_id || '';
      if (!id) return 'No certificate selected';
      const c = (this.tlsCerts || []).find(x => x.id === id);
      if (!c) return id;
      const src = c.source === 'letsencrypt' ? 'LE' : 'custom';
      return c.domain + ' · ' + src;
    },

    async init() {
      await Promise.all([this.fetch(), this.fetchTls()]);
    },

    async fetchTls() {
      try {
        const r = await fetch('/api/tls/certificates');
        const d = await r.json();
        this.tlsCerts = Array.isArray(d.certificates) ? d.certificates : [];
      } catch (e) { this.tlsCerts = []; }
    },

    async fetch() {
      this.loading = true;
      try {
        const r = await fetch('/api/hosts');
        const d = await r.json();
        this.hosts = Array.isArray(d) ? d : [];
      } catch(e) { this.hosts = []; }
      this.loading = false;
    },

    openAdd() {
      this.fetchTls();
      this.form = this.blank();
      this.isEdit = false;
      this.error = '';
      this.showModal = true;
    },

    openEdit(host) {
      this.fetchTls();
      this.form = {
        ...host,
        upstream_servers: (host.upstream_servers || []).join('\n'),
        ssl_cert_id: host.ssl_cert_id || ''
      };
      this.isEdit = true;
      this.error = '';
      this.showModal = true;
    },

    async save() {
      this.error = '';
      const servers = this.form.upstream_servers
        .split(/[\n,]/).map(s => s.trim()).filter(s => s);
      if (!this.form.domain.trim()) { this.error = 'Domain is required.'; return; }
      if (servers.length === 0) { this.error = 'At least one upstream server is required.'; return; }
      if (this.form.ssl_enabled && !(this.form.ssl_cert_id || '').trim()) {
        this.error = 'HTTPS requires a managed TLS certificate. Choose one in the dropdown or add a certificate on the SSL page.';
        return;
      }

      const payload = { ...this.form, upstream_servers: servers, enabled: true };
      if (!this.form.ssl_enabled) payload.ssl_cert_id = '';
      this.saving = true;
      try {
        const r = await fetch('/api/hosts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const d = await r.json();
        if (!d.ok) { this.error = d.error || 'Save failed.'; return; }
        this.showModal = false;
        await Promise.all([this.fetch(), this.fetchTls()]);
      } catch(e) { this.error = 'Network error. Try again.'; }
      this.saving = false;
    },

    async deleteHost(domain) {
      if (!confirm('Delete "' + domain + '"?\n\nThis will remove the nginx config and reload nginx.')) return;
      try {
        const r = await fetch('/api/hosts/' + encodeURIComponent(domain), { method: 'DELETE' });
        const d = await r.json();
        if (!d.ok) { alert(d.error || 'Delete failed'); return; }
        await this.fetch();
      } catch(e) { alert('Network error'); }
    }
  }
}
</script>
{{end}}
