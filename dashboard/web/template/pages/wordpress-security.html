{{define "content"}}
<div class="w-full min-h-[calc(100vh-6.5rem)] flex flex-col space-y-6" x-data="wpApp()" x-init="load()">

  <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
    <div>
      <h1 class="text-lg font-semibold text-white tracking-tight">WordPress Security</h1>
      <p class="text-gray-400 text-sm mt-1 max-w-3xl leading-relaxed">
        Menulis snippet nginx ke
        <span class="font-mono text-gray-500">/etc/nginx/snippets/flux-wp-managed.conf</span>.
        Tambahkan
        <span class="font-mono text-cyan-600/80">include /etc/nginx/snippets/flux-wp-managed.conf;</span>
        di dalam <span class="font-mono text-gray-500">server { }</span> yang mem-proxy WordPress.
        Snippet tidak berisi <span class="font-mono text-gray-500">proxy_pass</span>.
      </p>
    </div>
  </div>

  <div x-show="msgOk" x-cloak class="text-sm text-emerald-400 border border-emerald-500/30 bg-emerald-500/10 rounded-lg px-4 py-2" x-text="msgOk"></div>
  <div x-show="msgErr" x-cloak class="text-sm text-rose-400 border border-rose-500/30 bg-rose-500/10 rounded-lg px-4 py-2" x-text="msgErr"></div>

  <template x-if="loaded">
    <div class="space-y-8">

      <div>
        <h2 class="text-sm font-semibold text-white mb-2 flex items-center gap-2">
          <span class="w-1 h-4 rounded-full bg-amber-500"></span>
          Security rules
        </h2>
        <p class="text-xs text-gray-500 mb-4">
          Secara bawaan semua <span class="text-emerald-500/90">On</span>. Ubah ke <span class="text-gray-400">Off</span> untuk menonaktifkan per aturan di snippet.
        </p>

        <div class="rounded-xl border border-gray-800 bg-gray-900/40 divide-y divide-gray-800/80 overflow-hidden">
          <template x-for="row in ruleRows" :key="row.field">
            <div class="flex flex-col lg:flex-row lg:items-center gap-3 px-4 py-4 hover:bg-gray-800/20 transition-colors">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-cyan-100/90" x-text="row.title"></p>
                <p class="text-xs text-gray-500 mt-1 leading-relaxed" x-text="row.desc"></p>
              </div>
              <div class="flex-shrink-0 lg:w-44 w-full">
                <select class="w-full bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-emerald-500/40 outline-none"
                        :value="row.dual ? wpVersionValue() : (form[row.field] ? 'on' : 'off')"
                        @change="row.dual ? setWpVersion($event.target.value) : (form[row.field] = ($event.target.value === 'on'))">
                  <option value="off">Off</option>
                  <option value="on">On</option>
                </select>
              </div>
            </div>
          </template>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row sm:items-center gap-4 pt-2 border-t border-gray-800">
        <p class="text-xs text-gray-600 font-mono flex-1" x-show="form.last_written">
          Last written: <span x-text="form.last_written"></span>
        </p>
        <button type="button" @click="save()" :disabled="saving"
                class="sm:ml-auto w-full sm:w-auto bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 text-white text-sm font-semibold px-6 py-2.5 rounded-lg transition-colors">
          <span x-text="saving ? 'Menyimpan…' : 'Tulis snippet, simpan &amp; reload nginx'"></span>
        </button>
      </div>
    </div>
  </template>
</div>

<script src="/public/js/pages/wordpress-security.js?v={{.AssetVersion}}"></script>
{{end}}
