{{define "content"}}
<div class="w-full min-h-[calc(100vh-6.5rem)] flex flex-col space-y-6" x-data="wpApp()" x-init="load()">
  <p class="text-gray-400 text-sm">
    Menulis snippet nginx ke <span class="font-mono text-gray-500">/etc/nginx/snippets/flux-wp-managed.conf</span>.
    Anda harus menambahkan <span class="font-mono">include /etc/nginx/snippets/flux-wp-managed.conf;</span> di dalam <span class="font-mono">server { }</span> yang mem-proxy WordPress.
    Snippet tidak memuat <span class="font-mono">proxy_pass</span> — hanya blok deny/if aman.
  </p>

  <div x-show="msgOk" x-cloak class="text-sm text-emerald-400 border border-emerald-500/30 bg-emerald-500/10 rounded-lg px-4 py-2" x-text="msgOk"></div>
  <div x-show="msgErr" x-cloak class="text-sm text-rose-400 border border-rose-500/30 bg-rose-500/10 rounded-lg px-4 py-2" x-text="msgErr"></div>

  <div class="rounded-xl border border-gray-800 bg-gray-900/40 p-5 space-y-3" x-show="loaded">
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" x-model="form.enabled" class="rounded border-gray-600 bg-gray-800 text-emerald-500">
      <span class="text-sm text-gray-300">Aktifkan aturan di snippet</span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" x-model="form.block_xmlrpc" class="rounded border-gray-600 bg-gray-800 text-emerald-500">
      <span class="text-sm text-gray-300">Blokir <span class="font-mono">/xmlrpc.php</span></span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" x-model="form.block_sensitive_files" class="rounded border-gray-600 bg-gray-800 text-emerald-500">
      <span class="text-sm text-gray-300">Blokir wp-config, .env, .git, …</span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" x-model="form.block_uploads_php" class="rounded border-gray-600 bg-gray-800 text-emerald-500">
      <span class="text-sm text-gray-300">Blokir PHP di uploads</span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" x-model="form.block_author_enum" class="rounded border-gray-600 bg-gray-800 text-emerald-500">
      <span class="text-sm text-gray-300">Blokir enumerasi ?author=</span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" x-model="form.block_scanner_ua" class="rounded border-gray-600 bg-gray-800 text-emerald-500">
      <span class="text-sm text-gray-300">Blokir user-agent scanner umum</span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" x-model="form.strip_asset_version" class="rounded border-gray-600 bg-gray-800 text-emerald-500">
      <span class="text-sm text-gray-300">Strip ?ver= pada CSS/JS (rewrite)</span>
    </label>
    <div>
      <label class="text-xs text-gray-500 uppercase">Catatan</label>
      <textarea x-model="form.notes" rows="2" class="w-full mt-1 bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-sm text-gray-200"></textarea>
    </div>
    <p class="text-xs text-gray-600 font-mono" x-show="form.last_written">Last written: <span x-text="form.last_written"></span></p>
    <button type="button" @click="save()" :disabled="saving"
            class="bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 text-white text-sm font-semibold px-5 py-2 rounded-lg">
      Tulis snippet &amp; simpan &amp; reload nginx
    </button>
  </div>
</div>
<script>
function wpApp() {
  return {
    loaded: false,
    saving: false,
    msgOk: '',
    msgErr: '',
    form: {},
    async load() {
      try {
        this.form = await fetch('/api/wp-security/config').then(r => r.json());
        this.loaded = true;
      } catch (e) { this.msgErr = e.message || String(e); }
    },
    async save() {
      this.saving = true; this.msgOk = ''; this.msgErr = '';
      try {
        const r = await fetch('/api/wp-security/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.form)
        });
        const t = await r.text();
        let j = {}; try { j = JSON.parse(t); } catch (_) {}
        if (!r.ok) throw new Error(j.error || t);
        this.msgOk = 'Snippet ditulis: ' + (j.snippet_path || 'ok');
        if (j.config) this.form = j.config;
        await this.load();
      } catch (e) { this.msgErr = e.message || String(e); }
      finally { this.saving = false; }
    }
  };
}
</script>
{{end}}
