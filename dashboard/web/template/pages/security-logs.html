{{define "content"}}
<div x-data="securityLogsApp()" x-init="load()">

  <div class="flex items-center justify-between mb-6 gap-4 flex-wrap">
    <p class="text-gray-400 text-sm max-w-2xl">
      Ringkasan event dari <span class="font-mono text-gray-500">coraza_audit.log</span> (Serial / JSON). Data disimpan di dashboard untuk tampilan cepat.
    </p>
    <button type="button" @click="load()"
            class="flex items-center gap-2 text-sm font-medium text-emerald-400 border border-emerald-500/30 hover:bg-emerald-500/10 px-3 py-2 rounded-lg transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
        <path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 0 1-9.925 4.5A5.5 5.5 0 0 1 5.5 4.25a5.5 5.5 0 0 1 4.607 2.5h-1.334A4.25 4.25 0 0 0 5.5 5.75c-2.35 0-4.25 1.9-4.25 4.25s1.9 4.25 4.25 4.25 4.25-1.9 4.25-4.25a4.23 4.23 0 0 0-.408-1.812h1.47a5.502 5.502 0 0 1-4.377 8.562 5.5 5.5 0 0 1 8.562-4.377v1.47c.64-.993 1.008-2.17 1.008-3.437a5.5 5.5 0 0 0-1.188-3.437h1.334Z" clip-rule="evenodd"/>
      </svg>
      Refresh
    </button>
  </div>

  <template x-if="loading">
    <div class="flex items-center justify-center py-20 text-gray-600 text-sm">
      <svg class="animate-spin w-6 h-6 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 0 1 8-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      Loading events…
    </div>
  </template>

  <template x-if="!loading && error">
    <div class="rounded-xl border border-rose-500/30 bg-rose-500/10 text-rose-200 text-sm px-4 py-3" x-text="error"></div>
  </template>

  <template x-if="!loading && !error && events.length === 0">
    <div class="rounded-xl border border-gray-800 bg-gray-900/50 text-gray-500 text-sm px-6 py-12 text-center">
      Belum ada event tercatat. Trigger request yang diintervensi WAF atau tunggu worker membaca log audit.
    </div>
  </template>

  <template x-if="!loading && !error && events.length > 0">
    <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden overflow-x-auto">
      <table class="w-full text-sm min-w-[720px]">
        <thead class="border-b border-gray-800">
          <tr class="text-xs font-semibold text-gray-500 uppercase tracking-wider">
            <th class="text-left px-4 py-3">Time</th>
            <th class="text-left px-4 py-3">Client</th>
            <th class="text-left px-4 py-3">Rule</th>
            <th class="text-left px-4 py-3">Action</th>
            <th class="text-left px-4 py-3">Message / URI</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-800">
          <template x-for="(ev, idx) in events" :key="idx">
            <tr class="hover:bg-gray-800/40 align-top">
              <td class="px-4 py-3 text-gray-500 font-mono text-xs whitespace-nowrap" x-text="ev.time || '—'"></td>
              <td class="px-4 py-3 text-gray-300 font-mono text-xs" x-text="ev.client_ip || '—'"></td>
              <td class="px-4 py-3 text-amber-400/90 font-mono text-xs" x-text="ev.rule_id || '—'"></td>
              <td class="px-4 py-3">
                <span class="text-xs font-medium px-2 py-0.5 rounded border"
                      :class="ev.action === 'blocked' ? 'text-rose-300 border-rose-500/30 bg-rose-500/10' : 'text-gray-400 border-gray-700 bg-gray-800'"
                      x-text="ev.action || '—'"></span>
              </td>
              <td class="px-4 py-3 text-gray-400 text-xs max-w-md">
                <p class="text-gray-300" x-text="ev.message || '—'"></p>
                <p class="font-mono text-gray-600 truncate mt-1" x-text="ev.uri || ''" x-show="ev.uri"></p>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>
</div>

<script>
function securityLogsApp() {
  return {
    loading: true,
    error: '',
    events: [],
    async load() {
      this.loading = true;
      this.error = '';
      try {
        const r = await fetch('/api/security-events');
        if (!r.ok) throw new Error(await r.text() || r.statusText);
        this.events = await r.json();
      } catch (e) {
        this.error = e.message || String(e);
        this.events = [];
      } finally {
        this.loading = false;
      }
    }
  };
}
</script>
{{end}}
