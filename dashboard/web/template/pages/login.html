{{define "login"}}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Flux WAF</title>
  <script src="/public/js/tailwindcss.min.js"></script>
  <link rel="stylesheet" href="/public/css/fonts.css">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full bg-gray-950 flex items-center justify-center">

  <!-- Background decoration -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-blue-500/5 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-sm px-6">

    <!-- Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-emerald-500/10 border border-emerald-500/30 mb-4">
        <span class="text-3xl">⚡</span>
      </div>
      <h1 class="text-2xl font-bold text-white">Flux WAF</h1>
      <p class="text-gray-500 text-sm mt-1">Web Application Firewall Dashboard</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-2xl">
      <h2 class="text-lg font-semibold text-white mb-5">Sign in</h2>

      {{if .Error}}
      <div class="mb-4 flex items-center gap-2.5 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm px-4 py-3 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 flex-shrink-0">
          <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
        </svg>
        Invalid username or password
      </div>
      {{end}}

      <form action="/api/login" method="POST" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5">Username</label>
          <input type="text" name="username" required autofocus
                 class="w-full bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3.5 py-2.5
                        placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500
                        transition-colors"
                 placeholder="admin">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5">Password</label>
          <input type="password" name="password" required
                 class="w-full bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3.5 py-2.5
                        placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500
                        transition-colors"
                 placeholder="••••••••">
        </div>
        <button type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-semibold py-2.5 px-4
                       rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-emerald-500/50 mt-2">
          Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-gray-700 text-xs mt-6">
      Default credentials: <span class="text-gray-500 font-mono">admin / admin</span>
    </p>
  </div>
</body>
</html>
{{end}}
