{{define "content"}}
<div x-data="nginxMon()" x-init="start()">

  <p class="text-gray-400 text-sm mb-6 max-w-2xl">
    Data dari <span class="font-mono text-gray-500">stub_status</span> di
    <span class="font-mono text-gray-500">127.0.0.1:81/nginx_status</span> (tanpa WAF). Refresh otomatis setiap 4 detik.
  </p>

  <div class="flex items-center gap-3 mb-6">
    <button type="button" @click="load()"
            class="text-sm font-medium text-emerald-400 border border-emerald-500/30 hover:bg-emerald-500/10 px-3 py-2 rounded-lg transition-colors">
      Refresh sekarang
    </button>
    <label class="flex items-center gap-2 text-xs text-gray-500 cursor-pointer select-none">
      <input type="checkbox" x-model="auto" class="rounded border-gray-700 bg-gray-900 text-emerald-500 focus:ring-emerald-500/40">
      Auto-refresh
    </label>
    <span x-show="loading" x-cloak class="text-xs text-gray-600">Memuat…</span>
  </div>

  <template x-if="error && !data">
    <div class="rounded-xl border border-rose-500/30 bg-rose-500/10 text-rose-200 text-sm px-4 py-3" x-text="error"></div>
  </template>

  <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
    <div class="rounded-xl border border-gray-800 bg-gray-900/60 p-4">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Koneksi aktif</p>
      <p class="text-2xl font-bold text-white font-mono" x-text="data?.active_connections ?? '—'"></p>
    </div>
    <div class="rounded-xl border border-gray-800 bg-gray-900/60 p-4">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Accepts</p>
      <p class="text-2xl font-bold text-emerald-400 font-mono" x-text="fmtNum(data?.accepts)"></p>
    </div>
    <div class="rounded-xl border border-gray-800 bg-gray-900/60 p-4">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Handled</p>
      <p class="text-2xl font-bold text-emerald-400 font-mono" x-text="fmtNum(data?.handled)"></p>
    </div>
    <div class="rounded-xl border border-gray-800 bg-gray-900/60 p-4">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Requests</p>
      <p class="text-2xl font-bold text-white font-mono" x-text="fmtNum(data?.requests)"></p>
    </div>
  </div>

  <div class="grid gap-4 sm:grid-cols-3 mt-4">
    <div class="rounded-xl border border-gray-800 bg-gray-900/60 p-4">
      <p class="text-xs text-gray-500 mb-1">Reading</p>
      <p class="text-lg font-mono text-amber-400" x-text="data?.reading ?? '—'"></p>
    </div>
    <div class="rounded-xl border border-gray-800 bg-gray-900/60 p-4">
      <p class="text-xs text-gray-500 mb-1">Writing</p>
      <p class="text-lg font-mono text-sky-400" x-text="data?.writing ?? '—'"></p>
    </div>
    <div class="rounded-xl border border-gray-800 bg-gray-900/60 p-4">
      <p class="text-xs text-gray-500 mb-1">Waiting</p>
      <p class="text-lg font-mono text-gray-300" x-text="data?.waiting ?? '—'"></p>
    </div>
  </div>

  <div class="mt-6 rounded-xl border px-4 py-3 text-sm"
       :class="data?.reachable ? 'border-emerald-500/30 bg-emerald-500/5 text-emerald-200/90' : 'border-amber-500/30 bg-amber-500/5 text-amber-200/90'">
    <span class="font-medium" x-text="data?.reachable ? 'Nginx stub_status OK' : 'Tidak bisa membaca stub_status'"></span>
    <p class="text-xs mt-1 opacity-80 font-mono" x-show="data?.detail" x-text="data?.detail"></p>
  </div>
</div>

<script>
function nginxMon() {
  return {
    loading: false,
    auto: true,
    error: '',
    data: null,
    timer: null,
    fmtNum(v) {
      if (v === undefined || v === null) return '—';
      return Number(v).toLocaleString();
    },
    async load() {
      this.loading = true;
      this.error = '';
      try {
        const r = await fetch('/api/system/nginx-status');
        if (!r.ok) throw new Error(await r.text() || r.statusText);
        this.data = await r.json();
      } catch (e) {
        this.error = e.message || String(e);
        this.data = null;
      } finally {
        this.loading = false;
      }
    },
    start() {
      this.load();
      this.timer = setInterval(() => {
        if (this.auto) this.load();
      }, 4000);
    }
  };
}
</script>
{{end}}
