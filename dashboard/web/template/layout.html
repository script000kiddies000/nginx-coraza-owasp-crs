{{define "layout"}}
<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — Flux WAF</title>
  <style>
    [x-cloak] {
      display: none !important
    }
  </style>
  <style>
    /* ── Theme Variables ── */
    :root {
      --sb-width: 252px;
      --sb-collapsed: 72px;
      --sb-bg: #0d1117;
      --sb-border: rgba(255, 255, 255, 0.06);
      --sb-hover: rgba(255, 255, 255, 0.05);
      --sb-active-bg: rgba(16, 185, 129, 0.10);
      --sb-active-border: #10b981;
      --nav-section-color: rgba(255, 255, 255, .30);
      --nav-item-color: #6b7280;
      --nav-hover-color: #d1d5db;
      --nav-active-color: #f9fafb;
      --nav-icon-bg: rgba(51, 65, 85, .22);
      --nav-icon-border: rgba(71, 85, 105, .35);
      --nav-icon-color: #94a3b8;
      --nav-arrow-color: #6b7280;
      --shell-body-bg: #030712;
      --shell-header-bg: rgba(17, 24, 39, 0.85);
      --shell-footer-bg: rgba(17, 24, 39, 0.85);
      --shell-divider: #1f2937;
      --shell-text: #f9fafb;
      --shell-text-muted: #6b7280;
      --user-card-bg: rgba(255, 255, 255, 0.05);
    }

    html.light {
      --sb-bg: #f8fafc;
      --sb-border: rgba(0, 0, 0, 0.08);
      --sb-hover: rgba(0, 0, 0, 0.05);
      --sb-active-bg: rgba(16, 185, 129, 0.12);
      --sb-active-border: #059669;
      --nav-section-color: rgba(0, 0, 0, .38);
      --nav-item-color: #64748b;
      --nav-hover-color: #1e293b;
      --nav-active-color: #0f172a;
      --nav-icon-bg: rgba(241, 245, 249, .85);
      --nav-icon-border: rgba(203, 213, 225, .70);
      --nav-icon-color: #475569;
      --nav-arrow-color: #94a3b8;
      --shell-body-bg: #f1f5f9;
      --shell-header-bg: rgba(255, 255, 255, 0.92);
      --shell-footer-bg: rgba(255, 255, 255, 0.92);
      --shell-divider: #e2e8f0;
      --shell-text: #0f172a;
      --shell-text-muted: #64748b;
      --user-card-bg: rgba(0, 0, 0, 0.04);
    }

    body {
      background-color: var(--shell-body-bg) !important;
      color: var(--shell-text) !important;
      transition: background-color .2s ease, color .2s ease;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sb-width);
      min-width: var(--sb-width);
      background: var(--sb-bg);
      border-right: 1px solid var(--sb-border);
      transition: width .26s ease, min-width .26s ease, background .2s ease, border-color .2s ease;
    }

    .sidebar.collapsed {
      width: var(--sb-collapsed);
      min-width: var(--sb-collapsed);
    }

    .sidebar-nav {
      scrollbar-width: none;
    }

    .sidebar-nav::-webkit-scrollbar {
      display: none;
    }

    .nav-section {
      padding: 13px 12px 5px;
    }

    .nav-section span {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--nav-section-color);
      transition: color .2s;
    }

    .nav-item,
    .nav-group-label,
    .nav-sub-item {
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--nav-item-color);
      transition: background .15s, color .15s;
    }

    .nav-item,
    .nav-group-label {
      height: 42px;
      padding: 0 12px;
      font-size: 14px;
      border-left: 2px solid transparent;
    }

    .nav-sub-item {
      height: 39px;
      padding: 0 12px;
      font-size: 13.5px;
      border-left: 2px solid transparent;
    }

    .nav-item:hover,
    .nav-group-label:hover,
    .nav-sub-item:hover {
      background: var(--sb-hover);
      color: var(--nav-hover-color);
    }

    .nav-item.active,
    .nav-sub-item.active {
      background: var(--sb-active-bg);
      color: var(--nav-active-color);
      border-left-color: var(--sb-active-border);
      font-weight: 600;
    }

    .nav-icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      min-width: 32px;
      border-radius: 8px;
      background: var(--nav-icon-bg);
      border: 1px solid var(--nav-icon-border);
      color: var(--nav-icon-color);
      transition: background .2s, border-color .2s;
    }

    .nav-sub-item .nav-icon-wrap {
      width: 30px;
      height: 30px;
      min-width: 30px;
    }

    .nav-icon-wrap svg {
      width: 17px;
      height: 17px;
    }

    .nav-sub-item .nav-icon-wrap svg {
      width: 15px;
      height: 15px;
    }

    /* per-route icon colors */
    a[href="/"] .nav-icon-wrap,
    a[href="/dashboard"] .nav-icon-wrap {
      color: #818cf8;
      background: rgba(79, 70, 229, .15);
      border-color: rgba(99, 102, 241, .30);
    }

    a[href="/attack-map"] .nav-icon-wrap {
      color: #38bdf8;
      background: rgba(2, 132, 199, .15);
      border-color: rgba(14, 165, 233, .30);
    }

    a[href="/hosts"] .nav-icon-wrap,
    a[href="/ssl"] .nav-icon-wrap {
      color: #22d3ee;
      background: rgba(8, 145, 178, .15);
      border-color: rgba(34, 211, 238, .30);
    }

    a[href="/waf/settings"] .nav-icon-wrap,
    a[href="/rules"] .nav-icon-wrap {
      color: #34d399;
      background: rgba(5, 150, 105, .15);
      border-color: rgba(52, 211, 153, .30);
    }

    a[href="/virtual-patching"] .nav-icon-wrap,
    a[href="/bot-management"] .nav-icon-wrap,
    a[href="/ja3-management"] .nav-icon-wrap,
    a[href="/threat-intel"] .nav-icon-wrap,
    a[href="/ip-reputations"] .nav-icon-wrap,
    a[href="/geo-blocking"] .nav-icon-wrap,
    a[href="/data-guard"] .nav-icon-wrap,
    a[href="/wordpress-security"] .nav-icon-wrap {
      color: #f59e0b;
      background: rgba(180, 83, 9, .15);
      border-color: rgba(251, 191, 36, .30);
    }

    a[href="/security-report"] .nav-icon-wrap,
    a[href="/attack-report"] .nav-icon-wrap {
      color: #94a3b8;
      background: rgba(71, 85, 105, .15);
      border-color: rgba(148, 163, 184, .30);
    }

    a[href="/security-logs"] .nav-icon-wrap,
    a[href="/logs"] .nav-icon-wrap,
    a[href="/event-logs"] .nav-icon-wrap {
      color: #fb7185;
      background: rgba(190, 24, 93, .15);
      border-color: rgba(251, 113, 133, .30);
    }

    a[href="/monitoring/nginx"] .nav-icon-wrap,
    a[href="/monitoring/server"] .nav-icon-wrap {
      color: #4ade80;
      background: rgba(22, 163, 74, .15);
      border-color: rgba(74, 222, 128, .30);
    }

    a[href="/settings"] .nav-icon-wrap,
    a[href="/settings/users"] .nav-icon-wrap {
      color: #a78bfa;
      background: rgba(124, 58, 237, .15);
      border-color: rgba(167, 139, 250, .30);
    }

    .nav-item:hover .nav-icon-wrap,
    .nav-sub-item:hover .nav-icon-wrap {
      filter: brightness(1.12);
    }

    .nav-item.active .nav-icon-wrap,
    .nav-sub-item.active .nav-icon-wrap {
      box-shadow: 0 0 10px currentColor;
      filter: brightness(1.18);
    }

    .nav-group-arrow {
      margin-left: auto;
      width: 13px;
      height: 13px;
      color: var(--nav-arrow-color);
      transition: transform .2s;
    }

    .nav-group-label.open .nav-group-arrow {
      transform: rotate(90deg);
    }

    .nav-group-children {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 2px 0 2px 12px;
    }

    /* Collapsed */
    .sidebar.collapsed .nav-label,
    .sidebar.collapsed .nav-section span,
    .sidebar.collapsed .nav-group-arrow {
      display: none;
    }

    .sidebar.collapsed .nav-item,
    .sidebar.collapsed .nav-group-label,
    .sidebar.collapsed .nav-sub-item {
      justify-content: center;
      padding: 0 4px;
      gap: 0;
      border-left-width: 0;
    }

    .sidebar.collapsed .nav-group-children {
      display: flex;
      padding-left: 0;
    }

    .sidebar.collapsed .nav-sub-item {
      height: 42px;
      font-size: 14px;
    }

    .sidebar.collapsed .nav-sub-item .nav-icon-wrap {
      width: 34px;
      height: 34px;
      min-width: 34px;
    }

    .sidebar.collapsed .nav-sub-item .nav-icon-wrap svg {
      width: 17px;
      height: 17px;
    }

    /* Tooltip on collapsed */
    .sidebar.collapsed .nav-item[data-tip],
    .sidebar.collapsed .nav-sub-item[data-tip] {
      position: relative;
    }

    .sidebar.collapsed .nav-item[data-tip]::after,
    .sidebar.collapsed .nav-sub-item[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      background: #1f2937;
      color: #f9fafb;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
      transition: opacity .15s;
      z-index: 1000;
    }

    .sidebar.collapsed .nav-item[data-tip]:hover::after,
    .sidebar.collapsed .nav-sub-item[data-tip]:hover::after {
      opacity: 1;
    }

    /* ── Shell: Header & Footer ── */
    .shell-header,
    .shell-footer {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background .2s ease, border-color .2s ease;
    }

    .shell-header {
      background: var(--shell-header-bg);
      border-bottom: 1px solid var(--shell-divider);
    }

    .shell-footer {
      background: var(--shell-footer-bg);
      border-top: 1px solid var(--shell-divider);
    }

    .shell-btn {
      color: var(--shell-text-muted);
      border-radius: 8px;
      transition: background .15s, color .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell-btn:hover {
      background: var(--sb-hover);
      color: var(--shell-text);
    }

    .user-card {
      background: var(--user-card-bg);
      transition: background .2s ease;
    }

    .footer-link {
      color: var(--shell-text-muted);
      transition: color .15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .footer-link:hover {
      color: #10b981;
    }

  </style>
  <link href="/public/css/light-mode.css?v={{.AssetVersion}}" rel="stylesheet">
  <script src="/public/js/tailwindcss.min.js?v={{.AssetVersion}}"></script>
  <script defer src="/public/js/alpine.min.js?v={{.AssetVersion}}"></script>
  <script src="/public/js/lucide.min.js?v={{.AssetVersion}}"></script>
  <link href="/public/css/fonts.css?v={{.AssetVersion}}" rel="stylesheet">

  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
    /* Apply saved theme before Alpine loads — prevents flash */
    (function () {
      if (localStorage.getItem('flux_dark_mode') === '0') document.documentElement.classList.add('light');
    })();
    function fluxSidebar() {
      return {
        sidebarOpen: true,
        darkMode: true,
        navG: { edge: false, waf: false, engines: false, rep: false, logs: false, mon: false, sys: false },
        loadNavState() {
          try {
            const raw = localStorage.getItem('flux_nav_g');
            if (raw) Object.assign(this.navG, JSON.parse(raw));
            const so = localStorage.getItem('flux_sidebar_open');
            if (so !== null) this.sidebarOpen = so === '1';
            const dm = localStorage.getItem('flux_dark_mode');
            this.darkMode = (dm === null) ? true : (dm === '1');
          } catch (e) { }
        },
        saveNavState() {
          try {
            localStorage.setItem('flux_nav_g', JSON.stringify(this.navG));
            localStorage.setItem('flux_sidebar_open', this.sidebarOpen ? '1' : '0');
          } catch (e) { }
        },
        toggleG(k) { this.navG[k] = !this.navG[k]; this.saveNavState(); },
        toggleSidebar() { this.sidebarOpen = !this.sidebarOpen; this.saveNavState(); },
        toggleDarkMode() {
          this.darkMode = !this.darkMode;
          document.documentElement.classList.toggle('light', !this.darkMode);
          try { localStorage.setItem('flux_dark_mode', this.darkMode ? '1' : '0'); } catch (e) { }
          this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
        },
        initNav() {
          this.loadNavState();
          const active = document.body.getAttribute('data-flux-active') || '';
          const open = { hosts: 'edge', ssl: 'edge', wafsettings: 'waf', rules: 'waf', vpatch: 'engines', botmgmt: 'engines', ja3: 'engines', threatintel: 'engines', iprep: 'engines', geoblock: 'engines', dlp: 'engines', wpsec: 'engines', secreport: 'rep', atkreport: 'rep', seclogs: 'logs', logs: 'logs', eventlogs: 'logs', 'nginx-mon': 'mon', 'srv-mon': 'mon', settings: 'sys', users: 'sys' };
          const g = open[active];
          if (g) this.navG[g] = true;
        }
      };
    }
  </script>
</head>

<body class="h-full" style="font-family:'Inter',sans-serif" data-flux-active="{{.ActiveMenu}}" x-data="fluxSidebar()"
  x-init="initNav()">

  {{template "sidebar" .}}

  <!-- ═══════════════ MAIN WRAPPER ═══════════════ -->
  <div :style="sidebarOpen ? 'margin-left:252px' : 'margin-left:72px'"
    class="transition-all duration-200 min-h-screen flex flex-col">

    <!-- ── HEADER ── -->
    <header class="shell-header h-14 flex items-center px-4 gap-3 sticky top-0 z-30">
      <!-- Hamburger toggle -->
      <button type="button" id="sidebar-toggle-btn" @click="toggleSidebar()" class="shell-btn p-2 shrink-0"
        :title="sidebarOpen ? 'Collapse sidebar' : 'Expand sidebar'">
        <i data-lucide="menu" class="w-5 h-5"></i>
      </button>

      <div class="w-px h-5 shrink-0" style="background:var(--shell-divider)"></div>

      <!-- Center: Active page indicator -->
      <div class="flex-1 flex items-center justify-center gap-1.5 text-[13px]">
        <i data-lucide="navigation" class="w-3.5 h-3.5 text-emerald-400 shrink-0"></i>
        <span class="font-semibold" style="color:var(--shell-text)">{{.Title}}</span>
      </div>

      <!-- Right: Dark / Light toggle -->
      <button type="button" id="theme-toggle-btn" @click="toggleDarkMode()" class="shell-btn p-2 shrink-0"
        :title="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
        <i x-show="darkMode" data-lucide="sun" class="w-[18px] h-[18px]"></i>
        <i x-show="!darkMode" x-cloak data-lucide="moon" class="w-[18px] h-[18px]"></i>
      </button>
    </header>

    <!-- ── CONTENT ── -->
    <main class="flex-1 p-6">
      {{template "content" .}}
    </main>

    <!-- ── FOOTER ── -->
    <footer class="shell-footer h-10 flex items-center justify-center px-4">
      <!-- Center: Copyright + GitHub -->
      <div class="flex items-center gap-1.5 text-[11px]" style="color:var(--shell-text-muted)">
        <span>©</span>
        <span id="footer-year">2025</span>
        <span class="font-semibold" style="color:var(--shell-text)">FluxWAF</span>
        <span>·</span>
        <a href="https://github.com/script000kiddies000/nginx-coraza-owasp-crs/" target="_blank"
          rel="noopener noreferrer" class="footer-link">
          <i data-lucide="github" class="w-3 h-3"></i>
          <span>GitHub</span>
          <i data-lucide="external-link" class="w-3 h-3 opacity-60"></i>
        </a>
      </div>
    </footer>

  </div>
  <!-- ═══════════════ END MAIN WRAPPER ═══════════════ -->

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.nav-item, .nav-sub-item').forEach(function (el) {
        if (el.getAttribute('data-tip')) return;
        const lbl = el.querySelector('.nav-label');
        if (lbl && lbl.textContent) el.setAttribute('data-tip', lbl.textContent.trim());
      });
      if (window.lucide) lucide.createIcons();
      const el = document.getElementById('footer-year');
      if (el) el.textContent = new Date().getFullYear();
    });
    document.addEventListener('alpine:initialized', function () {
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>

</html>
{{end}}
