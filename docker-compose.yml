version: '3.8'

services:
  waf:
    build: .
    container_name: nginx-coroza-crs
    network_mode: "host"
    # Catatan Port (Legacy): Karena menggunakan network_mode: host, deklarasi ports dinonaktifkan.
    # Nginx secara otomatis mem-bind port ke anatarmuka fisik (termasuk port dinamis).
    # Berikut adalah port referensi yang digunakan oleh sistem:
    # ports:
    #   - "80:80"       # Nginx WAF proxy (HTTP) — publik / ACME HTTP-01
    #   - "443:443"     # Nginx WAF proxy (HTTPS)
    #   - "8081:81"     # Nginx benchmark endpoint
    #   - "9080:8080"   # Flux WAF Dashboard (management UI)
    volumes:
      # Config files — read-only mount, bisa diedit tanpa rebuild image
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/conf.d:/etc/nginx/conf.d:rw
      - ./config/snippets:/etc/nginx/snippets:rw
      - ./config/errors:/etc/nginx/errors:ro
      # Threat intel — rw karena sync_threat_intel.py nulis ip_rules.conf dari host
      - ./config/threat-intel:/etc/nginx/threat-intel:rw
      # GeoIP2 — rw agar dashboard bisa menulis geoip-blocked-countries.conf (Geo blocking)
      - ./config/geoip:/etc/nginx/geoip:rw
      - ./config/coraza/coraza.conf:/etc/nginx/coraza/coraza.conf:ro
      - ./config/coraza/custom:/etc/nginx/coraza/custom:rw
      # CRS mounted as rw so s6 init can copy crs-setup.conf from example
      - ./config/coraza/crs:/etc/nginx/coraza/crs:rw

      # Logs — persistent di host
      # - access.log      : plain text (format main)
      # - access_json.log : JSON per-request (dibaca Go dashboard)
      # - error.log       : nginx error log
      # - coraza_audit.log: Coraza audit JSON
      - ./logs:/var/log/nginx

      # Flux WAF data — BoltDB untuk Go dashboard (diisi saat dashboard dibangun)
      - ./flux-data:/var/lib/flux-waf

      # SSL certs upload oleh user — dipersist di host, dibaca nginx di default.conf
      - ./ssl_certs:/etc/nginx/ssl_certs:rw
      # ACME HTTP-01 webroot — persist challenge files across container recreate
      - ./acme-webroot:/var/www/certbot:rw

    # Perf tuning — Go runtime environment untuk Coraza WAF
    # Revert: hapus blok environment ini jika RAM membengkak atau tidak ada perbedaan latency
    environment:
      # Flux WAF Dashboard — first-boot admin password (default: "admin" jika kosong)
      # Ganti sebelum deploy ke production!
      - FLUX_ADMIN_PASSWORD=admin
      # GOGC=400 -> GC Coraza lebih jarang, kurangi stop-the-world pause
      # Default: 100. Trade-off: heap Go bisa naik ~20-40MB sebelum GC.
      - GOGC=400
      # GOMAXPROCS -> paksa Go runtime pakai jumlah core yang benar di dalam container
      # Ganti angka sesuai vCPU yang dialokasikan ke container (cek: nproc)
      - GOMAXPROCS=4

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
