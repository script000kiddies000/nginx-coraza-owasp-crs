version: '3.8'

services:
  waf:
    build: .
    container_name: nginx-coraza-crs
    ports:
      - "8080:80"
      - "8443:443"
      - "8081:81"
    volumes:
      # Config files — read-only mount, bisa diedit tanpa rebuild image
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/conf.d:/etc/nginx/conf.d:ro
      - ./config/snippets:/etc/nginx/snippets:ro
      - ./config/errors:/etc/nginx/errors:ro
      # Threat intel — rw karena sync_threat_intel.py nulis ip_rules.conf dari host
      - ./config/threat-intel:/etc/nginx/threat-intel:rw
      # GeoIP2 — ro, mmdb diupdate dari host dengan download-geolite2.sh
      - ./config/geoip:/etc/nginx/geoip:ro
      - ./config/coraza/coraza.conf:/etc/nginx/coraza/coraza.conf:ro
      - ./config/coraza/custom:/etc/nginx/coraza/custom:ro
      # CRS mounted as rw so entrypoint can copy crs-setup.conf from example
      - ./config/coraza/crs:/etc/nginx/coraza/crs:rw

      # Logs — persistent di host
      # - access.log  → symlink ke stdout  (lihat via: docker logs nginx-coraza-crs)
      # - error.log   → symlink ke stderr  (lihat via: docker logs nginx-coraza-crs)
      # - coraza_audit.log → file JSON real  (lihat via: docker exec ... tail -f)
      - ./logs:/var/log/nginx

    # Perf tuning — Go runtime environment untuk Coraza WAF
    # Revert: hapus blok environment ini jika RAM membengkak atau tidak ada perbedaan latency
    environment:
      # GOGC=200 → GC Coraza 2x lebih jarang, kurangi stop-the-world pause
      # Default: 100. Trade-off: heap Go bisa naik ~20-40MB sebelum GC.
      - GOGC=400
      # GOMAXPROCS → paksa Go runtime pakai jumlah core yang benar di dalam container
      # Ganti angka sesuai vCPU yang dialokasikan ke container (cek: nproc)
      - GOMAXPROCS=4

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
