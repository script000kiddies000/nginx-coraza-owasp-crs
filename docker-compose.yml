version: '3.8'

services:
  waf:
    build: .
    container_name: nginx-coraza-crs
    ports:
      - "8080:80"
      - "8443:443"
      - "8081:81"
    volumes:
      # Config files — read-only mount, bisa diedit tanpa rebuild image
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/conf.d:/etc/nginx/conf.d:ro
      - ./config/snippets:/etc/nginx/snippets:ro
      - ./config/coraza/coraza.conf:/etc/nginx/coraza/coraza.conf:ro
      - ./config/coraza/custom:/etc/nginx/coraza/custom:ro
      - ./config/coraza/crs:/etc/nginx/coraza/crs:ro

      # Logs — persistent di host
      # - access.log  → symlink ke stdout  (lihat via: docker logs nginx-coraza-crs)
      # - error.log   → symlink ke stderr  (lihat via: docker logs nginx-coraza-crs)
      # - coraza_audit.log → file JSON real  (lihat via: docker exec ... tail -f)
      - ./logs:/var/log/nginx

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
