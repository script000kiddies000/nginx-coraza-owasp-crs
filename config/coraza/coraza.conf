# ==============================================================================
# Coraza WAF Engine Configuration + OWASP CRS v4 Loader
#
# File ini dimuat oleh directive:
#   coraza_rules_file /etc/nginx/coraza/coraza.conf;
# yang ada di conf.d/default.conf (server block).
#
# Untuk menambah virtual host baru, cukup tambahkan server block baru
# di conf.d/ dan arahkan coraza_rules_file ke file ini yang sama.
# ==============================================================================

# ── Engine Settings ──────────────────────────────────────────────────────────
# Mode global (On / Off / DetectionOnly) diatur oleh Flux WAF Dashboard
# → file ini di volume rw: config/coraza/custom/flux_waf_mode.conf
Include /etc/nginx/coraza/custom/flux_waf_mode.conf

# ── Request / Response body (limits + access) — ditulis Data Guard ───────────
Include /etc/nginx/coraza/custom/flux_dlp_inspection.conf

# ── Temporary Directories ────────────────────────────────────────────────────

SecTmpDir  /tmp/
SecDataDir /tmp/

# ── Audit Log ────────────────────────────────────────────────────────────────
# RelevantOnly = hanya log request yang diblokir (status 4xx/5xx)
# All          = log semua request (verbose, besar)

SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4)"
SecAuditLogParts ABIJDEFHKZ
SecAuditLogType Serial
SecAuditLog /var/log/nginx/coraza_audit.log

# ── Misc ─────────────────────────────────────────────────────────────────────

SecArgumentSeparator &
SecCookieFormat      0

# ==============================================================================
# OWASP Core Rule Set (CRS) v4 Setup
#
# crs-setup.conf mengatur:
#   - Paranoia Level (default 1, tingkatkan ke 2 untuk PCI DSS)
#   - Anomaly score thresholds
#   - Allowed HTTP methods
#   - Sampling percentage
# ==============================================================================
Include /etc/nginx/coraza/crs/crs-setup.conf

# ==============================================================================
# OWASP CRS Rules
# Urutan Include PENTING — jangan diubah
# ==============================================================================

# Pre-CRS exclusions (whitelist site-specific sebelum CRS berjalan)
Include /etc/nginx/coraza/crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf

# Virtual patch rules (custom, di-load sebelum CRS utama).
# Gunakan rentang ID >= 9900000 untuk menghindari tabrakan dengan ID CRS.
Include /etc/nginx/coraza/custom/vpatch.rules

# Basic standalone block rules (SQLi, XSS, Path Traversal, RCE)
Include /etc/nginx/coraza/custom/basic-rules.conf

# DLP / Data Guard — block credit card, AWS key, PEM private key, SSN, API key
Include /etc/nginx/coraza/custom/dlp-rules.conf

# Custom rules: skip response body inspection for JSON responses
Include /etc/nginx/coraza/custom/response-json-skip.conf

# Aturan Coraza tambahan dari dashboard (Custom Rules)
Include /etc/nginx/coraza/custom/flux_user_rules.conf

# CRS tuning (paranoia + inbound anomaly threshold) — ditulis oleh Flux WAF Dashboard
Include /etc/nginx/coraza/custom/flux_crs_tune.conf

# Initialization — wajib pertama kali, setup variabel tx.*
Include /etc/nginx/coraza/crs/rules/REQUEST-901-INITIALIZATION.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-905-COMMON-EXCEPTIONS.conf

# Protocol & Method enforcement
Include /etc/nginx/coraza/crs/rules/REQUEST-911-METHOD-ENFORCEMENT.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-913-SCANNER-DETECTION.conf
# (disabled) Temporary exclude for 920170/920171:
# Include /etc/nginx/coraza/custom/flux_crs_disable_protocol_920170.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-920-PROTOCOL-ENFORCEMENT.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-921-PROTOCOL-ATTACK.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-922-MULTIPART-ATTACK.conf

# Application attacks
Include /etc/nginx/coraza/crs/rules/REQUEST-930-APPLICATION-ATTACK-LFI.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-931-APPLICATION-ATTACK-RFI.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-932-APPLICATION-ATTACK-RCE.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-933-APPLICATION-ATTACK-PHP.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-934-APPLICATION-ATTACK-GENERIC.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-941-APPLICATION-ATTACK-XSS.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-943-APPLICATION-ATTACK-SESSION-FIXATION.conf
Include /etc/nginx/coraza/crs/rules/REQUEST-944-APPLICATION-ATTACK-JAVA.conf

# Blocking evaluation — WAJIB setelah semua request rules
Include /etc/nginx/coraza/crs/rules/REQUEST-949-BLOCKING-EVALUATION.conf

# Response body inspection (data leakage detection)
Include /etc/nginx/coraza/crs/rules/RESPONSE-950-DATA-LEAKAGES.conf
Include /etc/nginx/coraza/crs/rules/RESPONSE-951-DATA-LEAKAGES-SQL.conf
Include /etc/nginx/coraza/crs/rules/RESPONSE-952-DATA-LEAKAGES-JAVA.conf
Include /etc/nginx/coraza/crs/rules/RESPONSE-953-DATA-LEAKAGES-PHP.conf
Include /etc/nginx/coraza/crs/rules/RESPONSE-954-DATA-LEAKAGES-IIS.conf
Include /etc/nginx/coraza/crs/rules/RESPONSE-955-WEB-SHELLS.conf
Include /etc/nginx/coraza/crs/rules/RESPONSE-959-BLOCKING-EVALUATION.conf
Include /etc/nginx/coraza/crs/rules/RESPONSE-980-CORRELATION.conf

# Post-CRS exclusions (whitelist setelah semua rules berjalan)
Include /etc/nginx/coraza/crs/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf
