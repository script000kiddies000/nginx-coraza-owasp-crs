# Sementara: nonaktifkan CRS 920170 / 920171 (GET|HEAD + body / + Transfer-Encoding).
# Alasan: coraza-nginx dapat mengekspos REQUEST_METHOD tidak selaras dengan $request (POST
# terbaca GET di engine) → false positive. Hapus Include ini setelah upstream diperbaiki.
# ID 919100: setelah REQUEST-901/905/911/913, sebelum 920170.
SecRule REQUEST_URI "@rx .*" \
    "id:919100,phase:1,pass,nolog,\
    ctl:ruleRemoveById=920170,\
    ctl:ruleRemoveById=920171"
