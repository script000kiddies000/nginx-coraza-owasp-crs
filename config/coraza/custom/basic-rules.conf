# ==============================================================================
# Basic Custom Rules — standalone protection layer
#
# CATATAN: OWASP CRS yang sudah di-load di coraza.conf mencakup pola-pola ini
# secara lebih komprehensif (scoring-based). Rules di sini bersifat direct-block
# sebagai lapis pertama sebelum CRS scoring berjalan.
#
# ID range: 9800xxx (aman, tidak tabrakan dengan CRS 900000+ atau vpatch 9900xxx)
# ==============================================================================

# ── SQL Injection ─────────────────────────────────────────────────────────────

SecRule ARGS "@rx (?:u?n)?i?on.*?(?:a?ll)?.*?(?:se?l?e?c?t?)" \
    "id:9800001,\
    phase:2,\
    block,\
    log,\
    t:none,t:urlDecodeUni,t:lowercase,\
    msg:'Basic Rule: SQL Injection - UNION SELECT',\
    tag:'attack-sqli'"

SecRule ARGS "@rx exec\s*\(" \
    "id:9800002,\
    phase:2,\
    block,\
    log,\
    t:none,t:urlDecodeUni,t:lowercase,\
    msg:'Basic Rule: SQL Injection - EXEC',\
    tag:'attack-sqli'"

# ── Cross-Site Scripting (XSS) ────────────────────────────────────────────────

SecRule ARGS|REQUEST_HEADERS "@rx <\s*script" \
    "id:9800010,\
    phase:2,\
    block,\
    log,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:lowercase,\
    msg:'Basic Rule: XSS - Script Tag',\
    tag:'attack-xss'"

SecRule ARGS "@rx javascript:" \
    "id:9800011,\
    phase:2,\
    block,\
    log,\
    t:none,t:urlDecodeUni,t:lowercase,\
    msg:'Basic Rule: XSS - JavaScript URI',\
    tag:'attack-xss'"

# ── Path Traversal ────────────────────────────────────────────────────────────

SecRule ARGS|REQUEST_URI "@rx \.\.[\/\\]" \
    "id:9800020,\
    phase:2,\
    block,\
    log,\
    t:none,t:urlDecodeUni,\
    msg:'Basic Rule: Path Traversal',\
    tag:'attack-lfi'"

SecRule ARGS|REQUEST_URI "@rx %2e%2e" \
    "id:9800021,\
    phase:2,\
    block,\
    log,\
    t:none,\
    msg:'Basic Rule: Path Traversal - URL Encoded',\
    tag:'attack-lfi'"

# ── Remote Command Execution ──────────────────────────────────────────────────

SecRule ARGS "@rx \$\(\(.*?\)\)" \
    "id:9800030,\
    phase:2,\
    block,\
    log,\
    t:none,t:urlDecodeUni,\
    msg:'Basic Rule: RCE - Shell Arithmetic Expansion',\
    tag:'attack-rce'"

SecRule ARGS "@rx `[^`]*`" \
    "id:9800031,\
    phase:2,\
    block,\
    log,\
    t:none,t:urlDecodeUni,\
    msg:'Basic Rule: RCE - Backtick Command Substitution',\
    tag:'attack-rce'"

# ── Disabled / Unsupported Rules ──────────────────────────────────────────────

# Rule id:5000 (@inspectFile) — tidak didukung di Coraza Go.
# Butuh external script handler (ModSecurity Apache only).

# Rule id:9000 (IP:@gt 100) — sintaks tidak valid di Coraza.
# Gunakan Nginx limit_req_zone untuk rate limiting (sudah ada di nginx.conf).
