# Custom Coraza rules: skip response body inspection for JSON
#
# Tujuan:
# - Mengurangi overhead WAF untuk endpoint yang me-return JSON (sering besar),
#   sementara tetap mempertahankan response inspection untuk konten lain.
#
# Catatan:
# - Menggunakan phase:1 (request phase) karena phase:3 sudah terlambat —
#   Coraza sudah mulai buffer response body sebelum phase:3 rules dieksekusi.
# - Request-side WAF (Phase 1/2) tetap aktif untuk semua request.
# - Hanya response body yang di-skip, bukan request inspection-nya.

# Skip response body inspection berdasarkan ekstensi .json di URI
SecRule REQUEST_URI "@rx \.json$" \
    "id:9902001,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ctl:responseBodyAccess=Off"

# Skip response body inspection berdasarkan Accept header yang minta JSON
SecRule REQUEST_HEADERS:Accept "@contains application/json" \
    "id:9902002,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ctl:responseBodyAccess=Off"
