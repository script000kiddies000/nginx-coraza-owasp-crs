# ==============================================================================
# DLP / Data Guard Rules
#
# Tujuan : deteksi & block pengiriman data sensitif lewat request body.
# Scope  : REQUEST_BODY (inbound). Response-side DLP butuh SecResponseBodyAccess On
#          (saat ini Off secara global untuk performa — lihat coraza.conf).
#
# ID range : 9810xxx (tidak bentrok CRS 900000+, vpatch 9900xxx, basic 9800xxx)
# SecRequestBodyAccess On + SecRequestBodyLimit sudah dikonfigurasi di coraza.conf.
# ==============================================================================

# ── Credit Card Number ────────────────────────────────────────────────────────

SecRule REQUEST_BODY \
    "@rx \b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|6(?:011|5[0-9]{2})[0-9]{12})\b" \
    "id:9810100,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    t:none,\
    msg:'DLP: Credit Card Number detected',\
    tag:'dlp',\
    severity:'CRITICAL'"

# ── Social Security Number ─────────────────────────────────────────────────────

SecRule REQUEST_BODY \
    "@rx \b(?:[1-8][0-9]{2}|9(?:[0-8][0-9]|9[0-9]))-(?:[1-9][0-9]|0[1-9])-(?:[1-9][0-9]{3}|0[1-9][0-9]{2}|00[1-9][0-9]|000[1-9])\b" \
    "id:9810200,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    t:none,\
    msg:'DLP: Social Security Number detected',\
    tag:'dlp',\
    severity:'CRITICAL'"

# ── API Key / Bearer Token ────────────────────────────────────────────────────

SecRule REQUEST_BODY \
    "@rx (?i)(?:api[_\-]?key|bearer|access[_\-]?token|secret)[^\S\n]*[:=][^\S\n]*[A-Za-z0-9\-_.~+/]{16,64}" \
    "id:9810500,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    t:none,\
    msg:'DLP: API Key / Bearer Token detected',\
    tag:'dlp',\
    severity:'CRITICAL'"

# ── Password in JSON Payload (log only, tidak block) ──────────────────────────
# Pass karena login form legitimate juga cocok pola ini.

SecRule REQUEST_BODY \
    "@rx (?i)\x22(?:password|passwd|pwd|secret)\x22\s*:\s*\x22[^\x22]{4,}\x22" \
    "id:9810600,\
    phase:2,\
    pass,\
    log,\
    t:none,\
    msg:'DLP: Password field in payload (audit only)',\
    tag:'dlp',\
    severity:'ERROR'"

# ── AWS Access Key ────────────────────────────────────────────────────────────

SecRule REQUEST_BODY \
    "@rx AKIA[0-9A-Z]{16}" \
    "id:9810700,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    t:none,\
    msg:'DLP: AWS Access Key detected',\
    tag:'dlp',\
    severity:'CRITICAL'"

# ── Private Key PEM ───────────────────────────────────────────────────────────

SecRule REQUEST_BODY \
    "@rx -----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----" \
    "id:9810800,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    t:none,\
    msg:'DLP: Private Key (PEM) detected',\
    tag:'dlp',\
    severity:'CRITICAL'"

# ── JWT Token (log only, tidak block) ─────────────────────────────────────────
# Pass karena JWT sering dikirim secara legitimate di Authorization header/body.

SecRule REQUEST_BODY \
    "@rx eyJ[A-Za-z0-9\-_]{10,}\.eyJ[A-Za-z0-9\-_]{10,}\.[A-Za-z0-9\-_.+/]{10,}" \
    "id:9810900,\
    phase:2,\
    pass,\
    log,\
    t:none,\
    msg:'DLP: JWT Token in body (audit only)',\
    tag:'dlp',\
    severity:'ERROR'"
