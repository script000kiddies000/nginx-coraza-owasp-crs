server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Block bad JA3 (TLS fingerprint) early.
    # Safe to include even on HTTP/80: `$ssl_ja3` is empty -> map defaults allow.
    include /etc/nginx/snippets/wafx-ja3-enforce.conf;

    coraza on;
    coraza_rules_file /etc/nginx/coraza/coraza.conf;

    location / {
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_pass         http://httpbin_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    server_name _;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    # Strong HTTP security headers (TLS only)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Expose JA3 hash in response header for debugging / tuning.
    # REMOVE this in production.
    add_header X-Wafx-JA3 $http_ssl_ja3_hash always;

    # Block bad JA3 (TLS fingerprint) early.
    include /etc/nginx/snippets/wafx-ja3-enforce.conf;

    coraza on;
    coraza_rules_file /etc/nginx/coraza/coraza.conf;

    location / {
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_pass         http://httpbin_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 81;
    listen [::]:81;

    server_name _;

    # Pure Nginx benchmark endpoint: no WAF, no backend.
    location = /bench {
        return 200 "OK\n";
    }
}
