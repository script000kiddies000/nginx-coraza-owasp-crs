server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Block JA3 / JA4 / GeoIP sebelum Coraza (alasan → flux-403-block-reason.conf).
    include /etc/nginx/snippets/flux-early-deny.conf;

    # Strip backend version/technology disclosure headers
    include /etc/nginx/snippets/hide-backend-headers.conf;

    coraza on;
    coraza_rules_file /etc/nginx/coraza/coraza.conf;

    # ACME HTTP-01 (Let's Encrypt)
    location ^~ /.well-known/acme-challenge/ {
        coraza off;
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    # Implicit browser request; answer locally (avoid proxy + 499 noise on favicon)
    location = /favicon.ico {
        access_log off;
        add_header Cache-Control "public, max-age=604800" always;
        return 204;
    }

    # Custom error pages
    error_page 400          /errors/400.html;
    error_page 401          /errors/401.html;
    error_page 403          /errors/403.html;
    error_page 404          /errors/404.html;
    error_page 429          /errors/429.html;
    error_page 500          /errors/500.html;
    error_page 502 503 504  /errors/502.html;

    location ^~ /errors/ {
        internal;
        coraza off;
        root             /etc/nginx;
        add_header       Cache-Control "no-store" always;
        add_header       X-Request-ID  $request_id always;
        add_header       X-Flux-Block-Reason $flux_block_reason_display always;
        sub_filter       '__REQUEST_ID__' $request_id;
        sub_filter       '__FLUX_BLOCK_REASON__' $flux_block_reason_display;
        sub_filter_once  on;
    }

    # Static assets bypass (no WAF) to avoid per-file WAF overhead/timeouts.
    location ^~ /flasgger_static/ {
        include /etc/nginx/snippets/static-assets-bypass.conf;
        proxy_pass         http://httpbin_backend;
    }

    location ~* \.(?:css|js|map|png|jpe?g|gif|svg|ico|woff2?|ttf|eot)$ {
        include /etc/nginx/snippets/static-assets-bypass.conf;
        proxy_pass         http://httpbin_backend;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_pass         http://httpbin_backend;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        add_header         X-Request-ID      $request_id always;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;

    server_name _;

    ssl_certificate     /etc/nginx/ssl_certs/localhost.crt;
    ssl_certificate_key /etc/nginx/ssl_certs/localhost.key;

    # Strong HTTP security headers (TLS only)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Expose JA3 hash in response header for debugging / tuning.
    # REMOVE this in production.
    add_header X-Wafx-JA3 $http_ssl_ja3_hash always;

    # Block JA3 / JA4 / GeoIP sebelum Coraza (alasan → flux-403-block-reason.conf).
    include /etc/nginx/snippets/flux-early-deny.conf;

    # Strip backend version/technology disclosure headers
    include /etc/nginx/snippets/hide-backend-headers.conf;

    coraza on;
    coraza_rules_file /etc/nginx/coraza/coraza.conf;

    location = /favicon.ico {
        access_log off;
        add_header Cache-Control "public, max-age=604800" always;
        return 204;
    }

    # Custom error pages
    error_page 400          /errors/400.html;
    error_page 401          /errors/401.html;
    error_page 403          /errors/403.html;
    error_page 404          /errors/404.html;
    error_page 429          /errors/429.html;
    error_page 500          /errors/500.html;
    error_page 502 503 504  /errors/502.html;

    location ^~ /errors/ {
        internal;
        coraza off;
        root             /etc/nginx;
        add_header       Cache-Control "no-store" always;
        add_header       X-Request-ID  $request_id always;
        add_header       X-Flux-Block-Reason $flux_block_reason_display always;
        sub_filter       '__REQUEST_ID__' $request_id;
        sub_filter       '__FLUX_BLOCK_REASON__' $flux_block_reason_display;
        sub_filter_once  on;
    }

    # Static assets bypass (no WAF) to avoid per-file WAF overhead/timeouts.
    # Adjust paths/extensions per-application/vhost.
    location ^~ /flasgger_static/ {
        include /etc/nginx/snippets/static-assets-bypass.conf;
        proxy_pass         http://httpbin_backend;
    }

    # Generic static assets bypass (safe default for many apps).
    location ~* \.(?:css|js|map|png|jpe?g|gif|svg|ico|woff2?|ttf|eot)$ {
        include /etc/nginx/snippets/static-assets-bypass.conf;
        proxy_pass         http://httpbin_backend;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_pass         http://httpbin_backend;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        add_header         X-Request-ID      $request_id always;
    }
}

server {
    listen 81;
    listen [::]:81;

    server_name _;

    # Pure Nginx benchmark endpoint: no WAF, no backend.
    location = /bench {
        return 200 "OK\n";
    }

    # stub_status — dibaca oleh Flux dashboard (Go) via 127.0.0.1:81
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow ::1;
        deny all;
    }
}
