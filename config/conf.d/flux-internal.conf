# flux-internal.conf — endpoint internal untuk Flux WAF Dashboard
# Dibaca oleh Go dashboard via http://127.0.0.1:8888/nginx_status
# Tidak diekspos ke luar container (bind ke 127.0.0.1 saja)
#
# Membutuhkan --with-http_stub_status_module saat build nginx (sudah aktif).

server {
    listen 127.0.0.1:8888;
    server_name _;
    access_log off;

    # Nginx metrics: active_connections, accepts, handled, requests, reading, writing, waiting
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny  all;
    }
}
