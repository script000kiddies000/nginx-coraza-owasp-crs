# Managed by Flux WAF — do not edit manually
# Domain: test3.local (test port)
# Mode:   reverse_proxy

upstream flux_test3_local {
    server evil.com;
    server evil2.com;
    keepalive 32;
}

server {
    listen 80;
    listen 3333;
    server_name test3.local;

    location ^~ /.well-known/acme-challenge/ {
        coraza off;
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    coraza on;
    coraza_rules_file /etc/nginx/coraza/coraza.conf;

    include /etc/nginx/snippets/hide-backend-headers.conf;

    location = /favicon.ico {
        access_log off;
        add_header Cache-Control "public, max-age=604800" always;
        return 204;
    }


    location / {
        proxy_pass         http://flux_test3_local;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $http_host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID    $request_id;
    }

}
