user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

# Load GeoIP2 module — MaxMind GeoLite2-Country.mmdb
load_module modules/ngx_http_geoip2_module.so;

# Load Coraza WAF dynamic module — WAJIB sebelum events {}
# File .so ada di /usr/share/nginx/modules/ (symlink dari /etc/nginx/modules/)
load_module modules/ngx_http_coraza_module.so;

events {
    worker_connections  8192;

    # Perf tuning — kurangi jitter/latency saat burst request
    # Revert: hapus 2 baris di bawah jika distribusi worker tidak merata atau CPU naik
    multi_accept  on;   # ambil semua koneksi pending sekaligus per event loop
    accept_mutex  off;  # semua worker bisa accept() langsung tanpa antri (efektif saat worker <= 8)
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 30;       # turun dari 65 — putus koneksi idle lebih cepat
    keepalive_requests 1000;

    # Perf tuning — cegah request body spill ke disk (/tmp) yang bikin latency spike
    # Revert: kembalikan ke default (8k) jika RAM server < 1GB dan banyak concurrent upload
    client_body_buffer_size   256k;
    client_max_body_size       10m;
    client_header_buffer_size   4k;

    # Timeout — anti-slowloris ringan, putus client yang terlalu lambat kirim request
    # Revert: naikkan nilai jika ada client legitimate dengan koneksi lambat (misal IoT)
    client_header_timeout  10s;
    client_body_timeout    10s;
    send_timeout           10s;

    # Sembunyikan versi nginx dari response header
    server_tokens off;

    # TLS settings (digunakan oleh server block yang listen 443)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    log_format main '$remote_addr - $request_id [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # flux_json — format paralel JSON untuk parsing oleh Go dashboard
    # File: /var/log/nginx/access_json.log (di-mount ke ./logs/ di host)
    log_format flux_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"request_id":"$request_id",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"host":"$host",'
            '"user_agent":"$http_user_agent",'
            '"referer":"$http_referer",'
            '"country":"$geoip2_data_country_code",'
            '"ssl_protocol":"$ssl_protocol",'
            '"ssl_ja3":"$http_ssl_ja3_hash"'
        '}';
    access_log /var/log/nginx/access_json.log flux_json;

    # Rate-limit zone for WordPress login brute-force protection (used by WafX snippet).
    # Example usage: limit_req zone=wafx_wp_login burst=5 nodelay; in /wp-login.php location.
    limit_req_zone $binary_remote_addr zone=wafx_wp_login:10m rate=10r/m;

    upstream httpbin_backend {
        server 172.17.0.1:80;
        keepalive 64;
    }

    # GeoIP2 — resolve country code dari IP client
    geoip2 /etc/nginx/geoip/GeoLite2-Country.mmdb {
        $geoip2_data_country_code country iso_code;
        $geoip2_data_country_name country names en;
    }

    # GeoIP2 country blocklist map (nilai $geoip2_blocked_country: 0=allow, 1=block)
    include /etc/nginx/geoip/geoip-blocked-countries.conf;

    # Shared snippets (http-level). Contains `map` for JA3 blocklist.
    include /etc/nginx/snippets/wafx-ja3-map.conf;

    # Threat Intel IP blocklist — deny directives generated by sync_threat_intel.py.
    # Applied globally (all server blocks). Run: python3 scripts/sync_threat_intel.py
    include /etc/nginx/threat-intel/ip_rules.conf;

    # Virtual host configs (default.conf dimuat dari sini)
    include /etc/nginx/conf.d/*.conf;
}
