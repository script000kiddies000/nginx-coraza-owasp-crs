<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Not Found | Flux WAF</title>
  <link rel="stylesheet" href="/errors/error.css">
</head>
<body>
  <div class="card">
    <div class="icon-wrap blue">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </div>
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The resource you requested could not be found on this server. It may have been moved, deleted, or never existed.</p>
    <div class="ref">
      <span>Reference ID</span>
      <span class="ref-id" id="rid">__REQUEST_ID__</span>
      <button class="copy-btn" onclick="copyRef()">Copy</button>
    </div>
    <a class="btn" href="/">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Back to Home
    </a>
  </div>
  <div class="brand">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <span class="brand-name">FLUX WAF</span>
    <span class="dot">·</span>
    <span>Protected by Coraza + OWASP CRS</span>
  </div>
  <script>
    function copyRef(){var t=document.getElementById('rid').textContent;navigator.clipboard&&navigator.clipboard.writeText(t);var b=document.querySelector('.copy-btn');b.textContent='Copied!';setTimeout(function(){b.textContent='Copy';},1500);}
  </script>
</body>
</html>
