<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>502 — Service Unavailable | Flux WAF</title>
  <link rel="stylesheet" href="/errors/error.css">
</head>
<body>
  <div class="card">

    <div class="icon-wrap blue">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <div class="code">502</div>
    <h1>Service Unavailable</h1>
    <p>The backend server is not responding. The upstream service may be restarting or temporarily down. Please try again in a few moments.</p>

    <div class="ref">
      <span>Reference ID</span>
      <span class="ref-id" id="rid">__REQUEST_ID__</span>
      <button class="copy-btn" onclick="copyRef()">Copy</button>
    </div>

    <a class="btn" onclick="location.reload()" href="javascript:void(0)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Reload Page
    </a>

  </div>

  <div class="brand">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <span class="brand-name">FLUX WAF</span>
    <span class="dot">·</span>
    <span>Protected by Coraza + OWASP CRS</span>
  </div>

  <script>
    function copyRef() {
      var t = document.getElementById('rid').textContent;
      navigator.clipboard && navigator.clipboard.writeText(t);
      var btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(function(){ btn.textContent = 'Copy'; }, 1500);
    }
  </script>
</body>
</html>
