<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>429 — Too Many Requests | Flux WAF</title>
  <link rel="stylesheet" href="/errors/error.css">
</head>
<body>
  <div class="card">

    <div class="icon-wrap amber">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>

    <div class="code amber">429</div>
    <h1>Too Many Requests</h1>
    <p>You have sent too many requests in a short period of time. Please slow down and try again in a moment.</p>

    <div class="ref">
      <span>Reference ID</span>
      <span class="ref-id" id="rid">__REQUEST_ID__</span>
      <button class="copy-btn" onclick="copyRef()">Copy</button>
    </div>

    <a class="btn" id="retry-btn" href="javascript:void(0)" onclick="startCountdown()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      <span id="retry-label">Retry in 30s</span>
    </a>

  </div>

  <div class="brand">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <span class="brand-name">FLUX WAF</span>
    <span class="dot">·</span>
    <span>Protected by Coraza + OWASP CRS</span>
  </div>

  <script>
    function copyRef() {
      var t = document.getElementById('rid').textContent;
      navigator.clipboard && navigator.clipboard.writeText(t);
      var btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(function(){ btn.textContent = 'Copy'; }, 1500);
    }
    var countdown = 30;
    var timer;
    function startCountdown() {
      clearInterval(timer);
      var label = document.getElementById('retry-label');
      var btn   = document.getElementById('retry-btn');
      btn.style.pointerEvents = 'none';
      btn.style.opacity = '0.6';
      timer = setInterval(function () {
        countdown--;
        label.textContent = countdown > 0 ? 'Retry in ' + countdown + 's' : 'Retrying…';
        if (countdown <= 0) { clearInterval(timer); location.reload(); }
      }, 1000);
    }
    startCountdown();
  </script>
</body>
</html>
