# ==============================================================================
# hide-backend-headers.conf — Strip technology/version disclosure headers
#
# Di-include di setiap server {} block yang proxying ke backend.
# Mencegah fingerprinting stack backend dari response header.
#
# Coverage:
#   PHP          → X-Powered-By: PHP/8.x
#   Node/Express → X-Powered-By: Express
#   ASP.NET      → X-Powered-By, X-AspNet-Version, X-AspNetMvc-Version
#   Django       → Server: WSGIServer/... (dari gunicorn/uwsgi)
#   Rails        → X-Powered-By, X-Runtime, X-Request-Id (rails-specific)
#   Drupal       → X-Generator, X-Drupal-Cache, X-Drupal-Dynamic-Cache
#   Varnish CDN  → X-Varnish, Via
#   Generic      → Server (diganti "Flux WAF")
# ==============================================================================

# ── PHP / Generic ─────────────────────────────────────────────────────────────
proxy_hide_header X-Powered-By;

# ── ASP.NET ───────────────────────────────────────────────────────────────────
proxy_hide_header X-AspNet-Version;
proxy_hide_header X-AspNetMvc-Version;

# ── CMS / Framework ───────────────────────────────────────────────────────────
proxy_hide_header X-Generator;           # WordPress, Joomla, dsb
proxy_hide_header X-Drupal-Cache;
proxy_hide_header X-Drupal-Dynamic-Cache;

# ── Ruby on Rails ─────────────────────────────────────────────────────────────
proxy_hide_header X-Runtime;             # X-Runtime: 0.023456 (ms eksekusi)
proxy_hide_header X-Request-Id;          # Rails request ID (kita pakai $request_id sendiri)

# ── CDN / Proxy ───────────────────────────────────────────────────────────────
proxy_hide_header X-Varnish;
proxy_hide_header Via;

# ── Server header — ganti dengan nama generic ─────────────────────────────────
# server_tokens off (di nginx.conf) sudah hide versi Nginx kita sendiri.
# proxy_hide_header Server hides header dari backend, lalu kita inject ulang.
proxy_hide_header Server;
add_header       Server "Flux WAF" always;
