## Static assets bypass template (no WAF)
##
## Tujuan:
## - Matikan Coraza untuk asset statik (CSS/JS/fonts/images) agar cepat dan
##   menghindari overhead WAF per-file saat browser load banyak asset paralel.
##
## Cara pakai (di dalam server{}):
##   location ^~ /flasgger_static/ {
##       include /etc/nginx/snippets/static-assets-bypass.conf;
##       proxy_pass http://your_backend;
##   }
##
##   location ~* \.(?:css|js|map|png|jpe?g|gif|svg|ico|woff2?|ttf|eot)$ {
##       include /etc/nginx/snippets/static-assets-bypass.conf;
##       proxy_pass http://your_backend;
##   }

coraza off;

expires 7d;
add_header Cache-Control "public, max-age=604800" always;

proxy_http_version 1.1;
proxy_set_header   Connection        "";
proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;

