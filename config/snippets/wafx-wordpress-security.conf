## WafX WordPress Security — reverse proxy mode
##
## Gunakan snippet ini DI DALAM server{} yang mem‑proxy ke WordPress
## (misalnya ke backend PHP-FPM di server/container lain).
##
## Contoh minimal server block:
##
##   upstream wordpress_backend {
##       server wordpress:80;   # atau IP:port lain
##   }
##
##   server {
##       listen 443 ssl http2;
##       server_name blog.example.com;
##
##       # ... ssl_certificate, coraza, dsb ...
##
##       include /etc/nginx/snippets/wafx-wordpress-security.conf;
##
##       location / {
##           proxy_http_version 1.1;
##           proxy_set_header   Connection        "";
##           proxy_set_header   Host              $host;
##           proxy_set_header   X-Real-IP         $remote_addr;
##           proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
##           proxy_set_header   X-Forwarded-Proto $scheme;
##           proxy_pass         http://wordpress_backend;
##       }
##   }
##

