## WafX Advanced Bot Management — JA3 blocklist
##
## Source of truth (TLS handshake hash):
## - `$http_ssl_ja3_hash` comes from `nginx-ssl-fingerprint` (phuslu) module
##
## Notes:
## - This map must live in `http {}` context (not inside `server {}`).
## - For non-TLS traffic (plain HTTP), `$http_ssl_ja3_hash` is empty → default allow.
map $http_ssl_ja3_hash $wafx_ja3_blocked {
    default 0;

    # Python requests / urllib3
    "3b5074b1b5d032e5620f69f9159c1665" 1;
    # Python requests v2 (urllib3 2.x)
    "cd08e31494f9531f560d64c695473da9" 1;
    # Scrapy / Python generic
    "e6573e91e6eb777c0933c5b8f97f10cd" 1;
    # Headless Chrome (Puppeteer/Playwright)
    "de350869b8c85de67a350c8d186f11e6" 1;
    # Masscan / ZMap scanner
    "5555555555555555555555555555555a" 1;
    # curl cli linux
    #"1d573f07cf9592c93700cd3f524279e0" 1; 
}

