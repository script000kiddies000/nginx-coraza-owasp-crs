# Alasan 403 untuk halaman /errors/403.html (__FLUX_BLOCK_REASON__) dan header X-Flux-Block-Reason.
# Harus di-include di http {} SETELAH wafx-ja3-map.conf, wafx-ja4-map.conf, dan geoip-blocked-countries.conf.
#
# Prioritas sama dengan urutan if sebelumnya: JA3 > JA4 > GeoIP.
map "${wafx_ja3_blocked}:${wafx_ja4_blocked}:${geoip2_blocked_country}" $flux_early_block_msg {
    default "";

    "1:0:0" "Advanced Bot Management — JA3 TLS fingerprint blocklist";
    "1:1:0" "Advanced Bot Management — JA3 TLS fingerprint blocklist";
    "1:0:1" "Advanced Bot Management — JA3 TLS fingerprint blocklist";
    "1:1:1" "Advanced Bot Management — JA3 TLS fingerprint blocklist";
    "0:1:0" "Advanced Bot Management — JA4 TLS fingerprint blocklist";
    "0:1:1" "Advanced Bot Management — JA4 TLS fingerprint blocklist";
    "0:0:1" "GeoIP — blocked country / region policy";
}

# Teks tampilan: blok awal nginx (JA3/JA4/Geo) atau fallback (Coraza, Threat Intel deny, upstream).
map $flux_early_block_msg $flux_block_reason_display {
    default "Web Application Firewall (OWASP Coraza CRS), Threat Intel IP blocklist, or your origin server rejected the request.";
    ~^(.+)$ $1;
}
