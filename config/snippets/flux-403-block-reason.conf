# Alasan 403 untuk halaman /errors/403.html (__FLUX_BLOCK_REASON__) dan header X-Flux-Block-Reason.
# Harus di-include di http {} SETELAH wafx-ja3-map.conf, wafx-ja4-map.conf, dan geoip-blocked-countries.conf.
#
# ── Diagnosis fallback (teks default, bukan JA3/JA4/Geo): ─────────────────────
# 1) grep request_id di coraza_audit.log → ada rule id = Coraza/CRS.
# 2) access_json: upstream_status 403 & upstream_time ada isi → backend menolak.
# 3) access_json: upstream_status "-" & upstream_time "-" → Coraza/threat deny sebelum upstream.
# 4) Cek IP di config/threat-intel/ip_rules.conf & error.log (access forbidden by rule).
#
# Prioritas blok awal: JA3 > JA4 > GeoIP.
map "${wafx_ja3_blocked}:${wafx_ja4_blocked}:${geoip2_blocked_country}" $flux_early_block_msg {
    default "";

    "1:0:0" "Bot management — blokir sidik TLS (JA3)";
    "1:1:0" "Bot management — blokir sidik TLS (JA3)";
    "1:0:1" "Bot management — blokir sidik TLS (JA3)";
    "1:1:1" "Bot management — blokir sidik TLS (JA3)";
    "0:1:0" "Bot management — blokir sidik TLS (JA4)";
    "0:1:1" "Bot management — blokir sidik TLS (JA4)";
    "0:0:1" "GeoIP — negara/wilayah tidak diizinkan oleh kebijakan";
}

# Fallback: Coraza/CRS, deny Threat Intel, atau 403 dari origin — nginx tidak bisa membedakan di HTML saja.
map $flux_early_block_msg $flux_block_reason_display {
    default "WAF (Coraza/CRS), Threat Intel, atau backend. Cocokkan Reference ID dengan coraza_audit.log dan access_json.log (lihat upstream_status).";
    ~^(.+)$ $1;
}
