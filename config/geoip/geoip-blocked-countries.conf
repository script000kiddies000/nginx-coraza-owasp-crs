# ==============================================================================
# GeoIP2 Country Block Map
# Di-include di http {} block (nginx.conf).
#
# Tambah/hapus ISO code sesuai kebutuhan.
# Daftar ISO 3166-1 alpha-2: https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2
# ==============================================================================
map $geoip2_data_country_code $geoip2_blocked_country {
    default 0;

    # ── High-risk / sanction countries (common defaults) ─────────────────────
    CN 1;   # China
    RU 1;   # Russia
    KP 1;   # North Korea
    IR 1;   # Iran
    SY 1;   # Syria
    CU 1;   # Cuba

    # ── Uncomment sesuai kebutuhan ────────────────────────────────────────────
    # BY 1; # Belarus
    # VE 1; # Venezuela
    # MM 1; # Myanmar
    # YE 1; # Yemen
}
